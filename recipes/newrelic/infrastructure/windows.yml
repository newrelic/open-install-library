# Visit our schema definition for additional information on this file format.
# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: infrastructure-agent-installer
displayName: Infrastructure Agent
description: New Relic install recipe for the Infrastructure agent on Windows
repository: https://github.com/newrelic/infrastructure-agent

installTargets:
  - type: host
    os: windows

keywords:
  - Infrastructure
  - Agent
  - Windows

processMatch: []

# DEPRECATED! Use `validationUrl` instead.
validationNrql: "SELECT count(*) from SystemSample where hostname like '{{.HOSTNAME}}' FACET entityGuid SINCE 5 minutes ago"
validationUrl: "http://localhost:18003/v1/status/entity"

preInstall:
  requireAtDiscovery: |
    powershell -command '
    # Checking docker
    $foundService = Get-Service -Name cexecsvc -ErrorAction SilentlyContinue
    if($foundService.Length -gt 0) {
      exit 131
    }
    exit 0
    '

install:
  version: "3"
  silent: true

  tasks:
    default:
      cmds:
        - task: assert_required_permissions
        - task: assert_required_powershell
        - task: collect_meta
        - task: download_infra
        - task: remove_if_old_version
        - task: stop_existing_service
        - task: install_infra
        - task: start_infra
        - task: assert_agent_status_ok
        - task: get_infra_key

    assert_required_permissions:
      cmds:
        - |
          powershell -command '
          $currentPrincipal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          $isAdmin = $currentPrincipal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if(-not ($isAdmin))
          {
            Write-Host -ForegroundColor Red "Powershell needs to be started in Administrator permissions. Please restart Powershell in Administrator, and re-run the newrelic-cli command."
            exit 131;
          }
          '

    assert_required_powershell:
      cmds:
        - |
          powershell -command '
          $powershellEnabled = ""
          try {
            $powershellEnabled = Get-Command -All powershell.exe | select Name
          }
          catch { }
          if ($powershellEnabled.Name -ne "powershell.exe") {
            Write-Host -ForegroundColor Red "Powershell is required. Please start Powershell in Administrator, and re-run the newrelic-cli command."
            exit 131;
          }
          '

    remove_if_old_version:
      ignore_error: true
      cmds:
        - |
          powershell -command '
          $minVersion = [Version]"1.73.0"
          $AGENT_VERSION = "{{.INFRASTRUCTURE_AGENT_INSTALLER_VERSION}}"

          # Check if the target version being installed is < 1.73.0
          if ($AGENT_VERSION) {
            try {
              $target = [Version]$AGENT_VERSION
              if ($target -ge $minVersion) {
                exit 0
              }
            } catch {
              # Could not parse target version, fall through to installed version check
            }
          }

          $baseKeys = Get-ChildItem -Path HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall -ErrorAction SilentlyContinue `
            | % { $_.Name.TrimStart("HKEY_LOCAL_MACHINE\") }
          $wowKeys = Get-ChildItem -Path HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Uninstall -ErrorAction SilentlyContinue `
            | % { $_.Name.TrimStart("HKEY_LOCAL_MACHINE\") }
          $allKeys = $baseKeys + $wowKeys

          # If no specific target version, check the currently installed version
          if (-not $AGENT_VERSION) {
            $installedVersion = $null
            foreach ($key in $allKeys) {
              $keyData = Get-Item -LiteralPath "HKLM:\$key" -ErrorAction SilentlyContinue
              if ($keyData) {
                $name = $keyData.GetValue("DisplayName")
                if ($name -and $name -match "New Relic Infrastructure Agent") {
                  $installedVersion = $keyData.GetValue("DisplayVersion")
                  break
                }
              }
            }

            if (-not $installedVersion) {
              exit 0
            }

            try {
              $current = [Version]$installedVersion
            } catch {
              exit 0
            }

            if ($current -ge $minVersion) {
              exit 0
            }
          }

          try {
            if (Get-Service "newrelic-infra" -ErrorAction SilentlyContinue) {
              Stop-Service -Name "newrelic-infra" -Force -PassThru | Out-Null
            }

            $uninstallIds = New-Object System.Collections.ArrayList
            foreach ($key in $allKeys) {
              $keyData = Get-Item -LiteralPath "HKLM:\$key" -ErrorAction SilentlyContinue
              if ($keyData) {
                $name = $keyData.GetValue("DisplayName")
                if ($name -and $name -match "New Relic Infrastructure Agent") {
                  $keyId = Split-Path $key -Leaf
                  $uninstallIds.Add($keyId) | Out-Null
                }
              }
            }

            foreach ($uninstallId in $uninstallIds) {
              $uninstallCommand = "msiexec /x """ + $uninstallId + """ /qn"
              $er = (Invoke-Expression $uninstallCommand) 2>&1
              if ($er.Exception) {
                throw $er.Exception
              }
              Start-Sleep -s 15
            }
          } catch {
            throw $_.Exception
          }
          '

    stop_existing_service:
      cmds:
        - |
          powershell -command '
          $serviceName = "newrelic-infra"
          $service = Get-Service $serviceName -ErrorAction SilentlyContinue
          if ($service -ne $null) {
            if ($service.Status -eq "Running") {
              Write-Host "Stopping existing New Relic Infrastructure service before upgrade..."
              Stop-Service -Name $serviceName -Force
              Start-Sleep -Seconds 2
              Write-Host "Service stopped successfully"
            }
          }
          exit 0
          '

    download_infra:
      cmds:
        - |
          powershell -command '
          try {
            [Net.ServicePointManager]::SecurityProtocol = "tls";
            [Net.ServicePointManager]::SecurityProtocol = "tls12, tls";
            [Net.ServicePointManager]::SecurityProtocol = "tls13, tls12, tls"
          }
          catch {}

          $AGENT_VERSION = "{{.INFRASTRUCTURE_AGENT_INSTALLER_VERSION}}"
          $MSI_FILENAME = "newrelic-infra.msi"
          if ($AGENT_VERSION) {
            $MSI_FILENAME = "newrelic-infra.$AGENT_VERSION.msi"
          }
          $WebClient = New-Object System.Net.WebClient
          if ($env:HTTPS_PROXY) {
            $WebClient.Proxy = New-Object System.Net.WebProxy($env:HTTPS_PROXY, $true)
          }

          try {
            $WebClient.DownloadFile("{{.NEW_RELIC_DOWNLOAD_URL}}infrastructure_agent/windows/$MSI_FILENAME", "$env:TEMP\newrelic-infra.msi")
          }
          catch {
            $baseException = $_.Exception.GetBaseException()
            Write-Host -ForegroundColor Red "Failed to download New Relic Infrastructure Agent$(if ($AGENT_VERSION) { 
            " version: $AGENT_VERSION" } else { " latest version" }) ($($baseException.Message))"
            $errorCode = 24 # unknown download error

            switch ($baseException) {
              { $_ -is [Net.WebException] }            { $errorCode = 25 } # web download error
              { $_ -is [IO.IOException] }              { $errorCode = 26 } # file io error
              { $_ -is [UnauthorizedAccessException] } { $errorCode = 26 } # file io error
            }
            exit $errorCode
          }
          '
    
    install_infra:
      cmds:
        - |
          powershell -command '
          $LICENSE_KEY = "{{.NEW_RELIC_LICENSE_KEY}}"
          $InfraConfig = "C:\\Program Files\\New Relic\\newrelic-infra\\newrelic-infra.yml"
          $AGENT_VERSION = "{{.INFRASTRUCTURE_AGENT_INSTALLER_VERSION}}"
          $MSI_PATH = "$env:TEMP\newrelic-infra.msi"
          $EXTRACT_PATH = "$env:TEMP\\msi_extracted_install"

          if ($AGENT_VERSION) {
            Write-Host "Installing specific version of New Relic Infrastructure Agent: $AGENT_VERSION"
          } else {
            Write-Host "Installing latest version of New Relic Infrastructure Agent"
          }

          $existingService = Get-Service -Name "newrelic-infra" -ErrorAction SilentlyContinue

          $NEW_RELIC_REGION = "{{.NEW_RELIC_REGION}}"
          $customAttributes=@"
          {{.NRIA_CUSTOM_ATTRIBUTES}}
          "@

          function Write-FreshConfig {
            param([string]$Path, [string]$LicenseKey, [string]$Region, [string]$CustomAttrs)
            Remove-Item -Path $Path -Force -ErrorAction SilentlyContinue
            if ($Region -ilike "staging") {
              Add-Content -Path $Path -Value "staging: true" -Encoding utf8
            }
            Add-Content -Path $Path -Value "license_key: $LicenseKey" -Encoding utf8
            Add-Content -Path $Path -Value "enable_process_metrics: true" -Encoding utf8
            Add-Content -Path $Path -Value "status_server_enabled: true" -Encoding utf8
            Add-Content -Path $Path -Value "status_server_port: 18003" -Encoding utf8
            if (Test-Path env:HTTPS_PROXY) {
              Add-Content -Path $Path -Value "proxy: $env:HTTPS_PROXY" -Encoding utf8
            }
            Add-Content -Path $Path -Value $CustomAttrs -Encoding utf8
            Write-Host "Configuration written successfully"
          }

          if ($existingService) {
            Write-Host "Existing service detected, performing upgrade..."

            # Write fresh config before calling installer.ps1 — in upgrade mode
            # installer.ps1 preserves the existing config, so this ensures the service
            # starts with valid settings (including license_key) on the first start.
            Write-FreshConfig -Path $InfraConfig -LicenseKey $LICENSE_KEY -Region $NEW_RELIC_REGION -CustomAttrs $customAttributes

            # Extract MSI to get the latest installer.ps1 and binaries
            if (Test-Path $EXTRACT_PATH) {
              Remove-Item -Path $EXTRACT_PATH -Recurse -Force -ErrorAction SilentlyContinue
            }
            New-Item -Path $EXTRACT_PATH -ItemType Directory -Force | Out-Null

            $extractProcess = Start-Process -FilePath "msiexec.exe" -ArgumentList "/a `"$MSI_PATH`" /qn TARGETDIR=`"$EXTRACT_PATH`" /L*v `"$env:TEMP\\msi_extract.log`"" -Wait -NoNewWindow -PassThru
            if ($extractProcess.ExitCode -ne 0) {
              Write-Host -ForegroundColor Red "Failed to extract MSI: Exit code $($extractProcess.ExitCode)"
              exit $extractProcess.ExitCode
            }

            $installerScript = Get-ChildItem -Path $EXTRACT_PATH -Filter "installer.ps1" -Recurse | Select-Object -First 1
            if (-not $installerScript) {
              Write-Host -ForegroundColor Red "installer.ps1 not found in extracted MSI"
              exit 1
            }
            Write-Host "Found installer.ps1 at: $($installerScript.FullName)"

            $scriptDir = $installerScript.DirectoryName
            Push-Location $scriptDir
            try {
              & "$($installerScript.FullName)" -LicenseKey $LICENSE_KEY
              if ($LASTEXITCODE -ne 0) {
                Write-Host -ForegroundColor Red "installer.ps1 failed with exit code: $LASTEXITCODE"
                if (Test-Path "C:\\ProgramData\\New Relic\\newrelic-infra\\tmp\\newrelic_installer_debug.log") {
                  Write-Host "Debug log:" -ForegroundColor Yellow
                  Get-Content "C:\\ProgramData\\New Relic\\newrelic-infra\\tmp\\newrelic_installer_debug.log" -Tail 20
                }
                exit $LASTEXITCODE
              }
            } finally {
              Pop-Location
            }
          } else {
            Write-Host "No existing service detected, performing fresh install..."
            $process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/qn /i `"$MSI_PATH`" GENERATE_CONFIG=true LICENSE_KEY=`"$LICENSE_KEY`" /L*v `"$env:TEMP\\msi_install.log`"" -Wait -NoNewWindow -PassThru
            if ($process.ExitCode -ne 0) {
              Write-Host -ForegroundColor Red "MSI installation failed with exit code: $($process.ExitCode)"
              if (Test-Path "C:\\ProgramData\\New Relic\\newrelic-infra\\tmp\\newrelic_installer_debug.log") {
                Write-Host "Debug log:" -ForegroundColor Yellow
                Get-Content "C:\\ProgramData\\New Relic\\newrelic-infra\\tmp\\newrelic_installer_debug.log" -Tail 20
              }
              exit $process.ExitCode
            }

            # MSI generates config via yamlgen; rewrite fresh to ensure all required
            # settings are present before start_infra starts the service
            Write-FreshConfig -Path $InfraConfig -LicenseKey $LICENSE_KEY -Region $NEW_RELIC_REGION -CustomAttrs $customAttributes
          }
          '

    start_infra:
      cmds:
        - |
          powershell -command '
          $serviceName = "newrelic-infra"
          $service = Get-Service $serviceName -ErrorAction SilentlyContinue -ErrorVariable errorMessage
          if ($service -eq $null) {
              Write-Host "The service $serviceName is not present. Error message: $errorMessage" -ForegroundColor Red
          }
          if ($service.Status -ne "Running") {
              try {
                  Start-Service -Name $serviceName
                  Write-Host "New Relic infrastructure agent for Windows installed and started"  -ForegroundColor Green
              }
              catch {
                  Write-Host "Error starting service: $_" -ForegroundColor Red
              }
          }
          else {
              Write-Host "$serviceName is already running" -ForegroundColor Green
          }
          '

    assert_agent_status_ok:
      cmds:
        - |
          powershell -command '
            Function isInfraRunning {
              (Get-Service newrelic-infra -ErrorAction SilentlyContinue | Select-Object Status).Status -eq "Running"
            }
            $maxRetries = 150
            $tries = 0
            while ($tries -lt $maxRetries) {
              $tries += 1
              $statusCheckOutput = ""
              try {
                $statusCheckOutput=Invoke-WebRequest -UseBasicParsing -Method Get -Uri http://localhost:18003/v1/status/errors | Select-Object -ExpandProperty Content;
              } catch { }
              if ($statusCheckOutput -ieq "{}") {
                Write-Host "Agent status check ok."
                break
              }
              if ($statusCheckOutput -ieq "") {
                if ($tries -eq $maxRetries) {
                  if (isInfraRunning) {
                    Write-Host "detected newrelic-infra service running"
                    exit 0
                  }
                  Write-Host -ForegroundColor Red "infra-agent status endpoint not available";
                  exit 32;
                }
              } else {
                if ($tries -eq $maxRetries) {
                  if (isInfraRunning) {
                    Write-Host "detected newrelic-infra service running"
                    exit 0
                  }
                  Write-Host -ForegroundColor Red "infra-agent status check not healthy: $statusCheckOutput";
                  exit 33;
                }
              }
              Start-Sleep -s 2
            }
          '

    collect_meta:
      silent: true
      ignore_error: true
      cmds:
        - |
          powershell -command '
          $version = (Get-WmiObject -class Win32_OperatingSystem).Caption
          $metadata = "{""Metadata"":{""version"": ""$version""}}"
          try {
            $metadata | Set-Content {{.NR_CLI_OUTPUT}}
          } catch {}
          '

    get_infra_key:
      cmds:
        - |
          powershell -command '
            $maxRetries = 150
            $tries = 0
            while ($tries -lt $maxRetries) {
              $tries += 1
              $agentStatus = ""
              try {
                $agentStatus = Invoke-WebRequest -UseBasicParsing -Method Get -Uri http://localhost:18003/v1/status/errors | Select-Object -ExpandProperty Content;
              } catch { }
              if ($agentStatus -ieq "{}") {
                try {
                  $infraKey = Invoke-WebRequest -UseBasicParsing -Method Get -Uri http://localhost:18003/v1/status/entity | Select-Object -ExpandProperty Content;
                } catch { }

                $infraKey = $infraKey -replace "[""{}]","" -replace "^.*key:",""

                if ($infraKey) {
                  Write-Host "Infra key: $infraKey"
                  $metadata = "{""Metadata"":{""INFRA_KEY"":""$infraKey""}}"
                  try {
                    $metadata | Set-Content {{.NR_CLI_OUTPUT}}
                  } catch {}
                  break
                } 
              }
              Start-Sleep -s 1
            }

            if (($infraKey -eq $null) -or ($infraKey -eq "")) {
              Write-Host "empty infrastructure agent key"
            }
          '

postInstall:
  info: |2
      ⚙️  The Infrastructure Agent configuration file can be found in C:\Program Files\New Relic\newrelic-infra\newrelic-infra.yml
      Edit these files to make changes or configure advanced features for the agent. See the docs for options:
      Infrastructure Agent: https://docs.newrelic.com/docs/infrastructure/install-infrastructure-agent/configuration/infrastructure-agent-configuration-settings

      Note: Process monitoring has been enabled by default - all other config options are left to the user.
