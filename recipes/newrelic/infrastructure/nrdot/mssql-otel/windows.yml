# Visit our schema definition for additional information on this file format.
# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: nrdot-collector-mssql
displayName: NRDOT MSSQL (Windows)
description: New Relic install recipe for MSSQL monitoring via NRDOT Collector on Windows self-hosted environments
repository: https://github.com/newrelic/nrdot-collector-releases

installTargets:
  - type: host
    os: windows

keywords:
  - MSSQL
  - SQL Server
  - NRDOT
  - OpenTelemetry
  - OTel
  - Database
  - Windows

processMatch:
  - sqlservr

preInstall:
  discoveryMode:
    - targeted
  info: |
    To capture data from SQL Server, we need to create/authorize a monitoring identity
    (a SQL login, a Windows account, or a gMSA account depending on the authentication
    method you choose). This requires administrative access to your SQL Server instance
    (sysadmin role or equivalent) on the account running this installation.

inputVars:
  - name: NR_CLI_MSSQL_CONFIG_PRESET
    prompt: "NRDOT configuration - 1) Standard  2) Full-feature: "
    default: "1"
  - name: NR_CLI_MSSQL_AUTH_MODE
    prompt: "SQL Server authentication - 1) SQL Server Auth  2) Windows Auth  3) gMSA: "
    default: "1"
  - name: NR_CLI_MSSQL_SERVER
    prompt: "SQL Server host (e.g. localhost): "
    default: "localhost"
  - name: NR_CLI_MSSQL_PORT
    prompt: "SQL Server port: "
    default: "1433"
  - name: NR_CLI_MSSQL_SA_PASSWORD
    prompt: "SQL Server 'sa' password (mode 1 only, used once to create the newrelic login; leave blank otherwise): "
    secret: true
  - name: NR_CLI_MSSQL_WIN_ACCOUNT
    prompt: "Windows account to grant permissions to, DOMAIN\\username (mode 2 only; leave blank otherwise): "
  - name: NR_CLI_MSSQL_WIN_PASSWORD
    prompt: "Password for that Windows account (mode 2 only; leave blank otherwise): "
    secret: true
  - name: NR_CLI_MSSQL_GMSA_ACCOUNT
    prompt: "gMSA account, DOMAIN\\gMSAName$ (mode 3 only; leave blank otherwise): "

validationNrql: "SELECT count(*) FROM Metric WHERE metricName LIKE 'sqlserver.%' AND instrumentation.provider = 'opentelemetry' SINCE 10 minutes ago"

successLinkConfig:
  type: EXPLORER

install:
  version: "3"
  silent: true

  tasks:
    write_recipe_metadata:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $metadata = '{"Metadata":{"CapturedCliOutput":"true"}}'
          try { $metadata | Set-Content {{.NR_CLI_OUTPUT}} } catch {}
          PSEOF

    assert_pre_req:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $currentPrincipal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          $isAdmin = $currentPrincipal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) {
            Write-Host -ForegroundColor Red "This newrelic install must be run in an Administrator PowerShell session."
            exit 131
          }

          $sqlcmdPath = Get-Command sqlcmd.exe -ErrorAction SilentlyContinue
          if (-not $sqlcmdPath) {
            Write-Host -ForegroundColor Red "sqlcmd is required to configure SQL Server monitoring. Install the sqlcmd utility (https://learn.microsoft.com/sql/tools/sqlcmd/sqlcmd-utility) and re-run this recipe."
            exit 16
          }
          PSEOF

    assert_auth_inputs:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"

          switch ($mode) {
            "1" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_SA_PASSWORD}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_SA_PASSWORD is required for SQL Server Auth (mode 1)."
                exit 1
              }
            }
            "2" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_WIN_ACCOUNT}}") -or [string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_WIN_PASSWORD}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_WIN_ACCOUNT and NR_CLI_MSSQL_WIN_PASSWORD are both required for Windows Auth (mode 2)."
                exit 1
              }
            }
            "3" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_GMSA_ACCOUNT}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_GMSA_ACCOUNT is required for gMSA (mode 3)."
                exit 1
              }
            }
            default {
              Write-Host -ForegroundColor Red "NR_CLI_MSSQL_AUTH_MODE must be 1, 2, or 3."
              exit 1
            }
          }
          PSEOF

    assert_sql_server_version:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $server = "{{.NR_CLI_MSSQL_SERVER}}"
          $port = "{{.NR_CLI_MSSQL_PORT}}"

          if ($mode -eq "1") {
            $connArgs = @("-S", "$server,$port", "-U", "sa", "-P", "{{.NR_CLI_MSSQL_SA_PASSWORD}}")
          } else {
            $connArgs = @("-S", "$server,$port", "-E")
          }

          $query = "SET NOCOUNT ON; SELECT SERVERPROPERTY('ProductMajorVersion');"
          $result = & sqlcmd @connArgs -h -1 -Q $query 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host -ForegroundColor Red "Failed to connect to SQL Server to check its version:"
            Write-Host $result
            exit 1
          }

          $majorVersionLine = ($result | Where-Object { $_ -match '^\s*\d+\s*$' } | Select-Object -First 1)
          $majorVersion = if ($majorVersionLine) { [int]$majorVersionLine.Trim() } else { $null }

          if (-not $majorVersion -or $majorVersion -lt 14) {
            Write-Host -ForegroundColor Red "SQL Server version $majorVersion is not supported. SQL Server 2017 or later (major version 14+) is required."
            exit 1
          }

          Write-Host "SQL Server major version $majorVersion detected - supported."
          PSEOF

    install_nrdot:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          [Net.ServicePointManager]::SecurityProtocol = "tls12, tls"

          $CollectorService = "nrdot-collector"

          $LatestVersion = (Invoke-RestMethod -Uri "https://api.github.com/repos/newrelic/nrdot-collector-releases/releases/latest").tag_name
          if (-not $LatestVersion) {
            Write-Host -ForegroundColor Red "Failed to fetch the latest release version from GitHub. Please check your internet connection."
            exit 1
          }

          $InstalledVersion = $null
          $UninstallKeys = Get-ChildItem -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall" -ErrorAction SilentlyContinue
          foreach ($Key in $UninstallKeys) {
            $KeyData = Get-ItemProperty -Path $Key.PSPath -ErrorAction SilentlyContinue
            if ($KeyData.DisplayName -match "nrdot-collector") {
              $InstalledVersion = $KeyData.DisplayVersion
              break
            }
          }

          if ($InstalledVersion -and ("v$InstalledVersion" -eq $LatestVersion -or $InstalledVersion -eq $LatestVersion)) {
            Write-Host "nrdot-collector $LatestVersion is already installed. Skipping download."
            exit 0
          } elseif ($InstalledVersion) {
            Write-Host "Upgrading nrdot-collector from $InstalledVersion to $LatestVersion"
          } else {
            Write-Host "Installing nrdot-collector version: $LatestVersion"
          }

          $MsiPath = "$env:TEMP\nrdot-collector.msi"
          $LogPath = "$env:TEMP\nrdot_install.log"
          $DownloadUrl = "https://github.com/newrelic/nrdot-collector-releases/releases/download/$LatestVersion/nrdot-collector_${LatestVersion}_windows_x64.msi"
          Write-Host "Downloading from: $DownloadUrl"

          $WebClient = New-Object System.Net.WebClient
          $WebClient.Headers.Add("User-Agent", "Mozilla/5.0")
          if ($env:HTTPS_PROXY) {
            $WebClient.Proxy = New-Object System.Net.WebProxy($env:HTTPS_PROXY, $true)
          }
          try {
            $WebClient.DownloadFile($DownloadUrl, $MsiPath)
          } catch {
            Write-Host -ForegroundColor Red "Failed to download the nrdot-collector package: $_"
            exit 1
          }

          $Process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/i `"$MsiPath`" /qn /norestart /L*V `"$LogPath`"" -Wait -NoNewWindow -PassThru
          if ($Process.ExitCode -ne 0) {
            Write-Host -ForegroundColor Red "msiexec failed with exit code $($Process.ExitCode). See $LogPath for details."
            exit $Process.ExitCode
          }

          Remove-Item -Path $MsiPath -ErrorAction SilentlyContinue

          $Service = Get-Service -Name $CollectorService -ErrorAction SilentlyContinue
          if (-not $Service) {
            Write-Host -ForegroundColor Red "nrdot-collector service was not found after installation."
            exit 1
          }

          Write-Host "nrdot-collector installed successfully."
          PSEOF

    configure_database_user:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $server = "{{.NR_CLI_MSSQL_SERVER}}"
          $port = "{{.NR_CLI_MSSQL_PORT}}"
          $sqlFile = "$env:TEMP\nr-mssql-grant.sql"
          $pwFile = "$env:TEMP\nr-mssql-newrelic-pw.tmp"

          function Invoke-GrantScript($connArgs, $file) {
            $result = & sqlcmd @connArgs -i $file 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host -ForegroundColor Red "SQL script failed:"
              Write-Host $result
              exit 1
            }
            Write-Host $result
          }

          if ($mode -eq "1") {
            $chars = (48..57) + (65..90) + (97..122)
            $NrPassword = -join ($chars | Get-Random -Count 24 | ForEach-Object {[char]$_})
            $NrPassword | Set-Content -Path $pwFile -NoNewline

            $sql = @"
          USE [master];
          GO
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = 'newrelic')
            CREATE LOGIN [newrelic] WITH PASSWORD = '$NrPassword';
          ELSE
            ALTER LOGIN [newrelic] WITH PASSWORD = '$NrPassword';
          GO
          GRANT VIEW SERVER STATE TO [newrelic];
          GRANT VIEW ANY DEFINITION TO [newrelic];
          GRANT VIEW ANY DATABASE TO [newrelic];
          GO
          DECLARE @name SYSNAME;
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name]
          FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master', 'msdb', 'model', 'rdsadmin', 'distribution')
          AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              EXEC('USE [' + @name + '];
              IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''newrelic'')
              BEGIN
                CREATE USER [newrelic] FOR LOGIN [newrelic];
              END;
              GRANT VIEW DATABASE STATE TO [newrelic];');
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-U", "sa", "-P", "{{.NR_CLI_MSSQL_SA_PASSWORD}}") $sqlFile
          }
          elseif ($mode -eq "2") {
            $account = "{{.NR_CLI_MSSQL_WIN_ACCOUNT}}"
            $sql = @"
          USE [master];
          GO
          GRANT VIEW SERVER STATE TO [$account];
          GRANT VIEW ANY DEFINITION TO [$account];
          GRANT VIEW ANY DATABASE TO [$account];
          GO
          DECLARE @name SYSNAME;
          DECLARE @sql NVARCHAR(MAX);
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name]
          FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master', 'msdb', 'model', 'rdsadmin', 'distribution')
            AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              SET @sql = '
                USE [' + @name + '];
                IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''$account'')
                BEGIN
                  CREATE USER [$account] FOR LOGIN [$account];
                END;
                GRANT VIEW DATABASE STATE TO [$account];
                GRANT VIEW DEFINITION TO [$account];
                ALTER ROLE db_datareader ADD MEMBER [$account];';
              EXEC sp_executesql @sql;
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-E") $sqlFile
          }
          else {
            $gmsa = "{{.NR_CLI_MSSQL_GMSA_ACCOUNT}}"
            $sql = @"
          USE master;
          GO
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '$gmsa')
            CREATE LOGIN [$gmsa] FROM WINDOWS;
          GO
          GRANT VIEW SERVER STATE TO [$gmsa];
          GRANT VIEW ANY DEFINITION TO [$gmsa];
          GRANT VIEW ANY DATABASE TO [$gmsa];
          GO
          DECLARE @name SYSNAME;
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name] FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master','msdb','model','rdsadmin','distribution')
          AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              EXEC('USE [' + @name + '];
              IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''$gmsa'')
              BEGIN
                CREATE USER [$gmsa] FOR LOGIN [$gmsa];
              END;
              GRANT VIEW DATABASE STATE TO [$gmsa];');
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-E") $sqlFile
          }

          Remove-Item -Path $sqlFile -ErrorAction SilentlyContinue
          Write-Host "SQL Server monitoring identity configured successfully."
          PSEOF