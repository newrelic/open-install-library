# Visit our schema definition for additional information on this file format.
# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: nrdot-collector-mssql
displayName: NRDOT MSSQL (Windows)
description: New Relic install recipe for MSSQL monitoring via NRDOT Collector on Windows self-hosted environments
repository: https://github.com/newrelic/nrdot-collector-releases

installTargets:
  - type: host
    os: windows

keywords:
  - MSSQL
  - SQL Server
  - NRDOT
  - OpenTelemetry
  - OTel
  - Database
  - Windows

processMatch:
  - sqlservr

preInstall:
  discoveryMode:
    - targeted
  info: |
    To capture data from SQL Server, we need to create/authorize a monitoring identity
    (a SQL login, a Windows account, or a gMSA account depending on the authentication
    method you choose). This requires administrative access to your SQL Server instance
    (sysadmin role or equivalent) on the account running this installation.

inputVars:
  - name: NR_CLI_MSSQL_CONFIG_PRESET
    prompt: "NRDOT configuration - 1) Standard  2) Full-feature: "
    default: "1"
  - name: NR_CLI_MSSQL_AUTH_MODE
    prompt: "SQL Server authentication - 1) SQL Server Auth  2) Windows Auth  3) gMSA: "
    default: "1"
  - name: NR_CLI_MSSQL_SERVER
    prompt: "SQL Server host (e.g. localhost): "
    default: "localhost"
  - name: NR_CLI_MSSQL_PORT
    prompt: "SQL Server port: "
    default: "1433"
  - name: NR_CLI_MSSQL_SA_PASSWORD
    prompt: "SQL Server 'sa' password (mode 1 only, used once to create the newrelic login; leave blank otherwise): "
    secret: true
  - name: NR_CLI_MSSQL_LOGIN_NAME
    prompt: "Monitoring username: "
    default: "newrelic"
  - name: NR_CLI_MSSQL_WIN_ACCOUNT
    prompt: "Windows account to grant permissions to, DOMAIN\\username (mode 2 only; leave blank otherwise): "
  - name: NR_CLI_MSSQL_WIN_PASSWORD
    prompt: "Password for that Windows account (mode 2 only; leave blank otherwise): "
    secret: true
  - name: NR_CLI_MSSQL_GMSA_ACCOUNT
    prompt: "gMSA account, DOMAIN\\gMSAName$ (mode 3 only; leave blank otherwise): "

validationNrql: "SELECT count(*) FROM Metric WHERE metricName LIKE 'sqlserver.%' AND instrumentation.provider = 'opentelemetry' SINCE 10 minutes ago"

successLinkConfig:
  type: EXPLORER

install:
  version: "3"
  silent: true

  tasks:
    write_recipe_metadata:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $metadata = '{"Metadata":{"CapturedCliOutput":"true"}}'
          try { $metadata | Set-Content {{.NR_CLI_OUTPUT}} } catch {}
          PSEOF

    assert_pre_req:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $currentPrincipal = New-Object Security.Principal.WindowsPrincipal([Security.Principal.WindowsIdentity]::GetCurrent())
          $isAdmin = $currentPrincipal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) {
            Write-Host -ForegroundColor Red "This newrelic install must be run in an Administrator PowerShell session."
            exit 131
          }

          $sqlcmdPath = Get-Command sqlcmd.exe -ErrorAction SilentlyContinue
          if (-not $sqlcmdPath) {
            Write-Host -ForegroundColor Red "sqlcmd is required to configure SQL Server monitoring. Install the sqlcmd utility (https://learn.microsoft.com/sql/tools/sqlcmd/sqlcmd-utility) and re-run this recipe."
            exit 16
          }
          PSEOF

    assert_auth_inputs:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"

          switch ($mode) {
            "1" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_SA_PASSWORD}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_SA_PASSWORD is required for SQL Server Auth (mode 1)."
                exit 1
              }
            }
            "2" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_WIN_ACCOUNT}}") -or [string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_WIN_PASSWORD}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_WIN_ACCOUNT and NR_CLI_MSSQL_WIN_PASSWORD are both required for Windows Auth (mode 2)."
                exit 1
              }
            }
            "3" {
              if ([string]::IsNullOrWhiteSpace("{{.NR_CLI_MSSQL_GMSA_ACCOUNT}}")) {
                Write-Host -ForegroundColor Red "NR_CLI_MSSQL_GMSA_ACCOUNT is required for gMSA (mode 3)."
                exit 1
              }
            }
            default {
              Write-Host -ForegroundColor Red "NR_CLI_MSSQL_AUTH_MODE must be 1, 2, or 3."
              exit 1
            }
          }
          PSEOF

    assert_sql_server_version:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $server = "{{.NR_CLI_MSSQL_SERVER}}"
          $port = "{{.NR_CLI_MSSQL_PORT}}"

          if ($mode -eq "1") {
            $connArgs = @("-S", "$server,$port", "-U", "sa", "-P", "{{.NR_CLI_MSSQL_SA_PASSWORD}}", "-C")
          } else {
            $connArgs = @("-S", "$server,$port", "-E", "-C")
          }

          $query = "SET NOCOUNT ON; SELECT SERVERPROPERTY('ProductMajorVersion');"
          $result = & sqlcmd @connArgs -h -1 -Q $query 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host -ForegroundColor Red "Failed to connect to SQL Server to check its version:"
            Write-Host $result
            exit 1
          }

          $majorVersionLine = ($result | Where-Object { $_ -match '^\s*\d+\s*$' } | Select-Object -First 1)
          $majorVersion = if ($majorVersionLine) { [int]$majorVersionLine.Trim() } else { $null }

          if (-not $majorVersion -or $majorVersion -lt 14) {
            Write-Host -ForegroundColor Red "SQL Server version $majorVersion is not supported. SQL Server 2017 or later (major version 14+) is required."
            exit 1
          }

          Write-Host "SQL Server major version $majorVersion detected - supported."
          PSEOF

    install_nrdot:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          [Net.ServicePointManager]::SecurityProtocol = "tls12, tls"

          $CollectorService = "nrdot-collector"

          $LatestVersion = (Invoke-RestMethod -Uri "https://api.github.com/repos/newrelic/nrdot-collector-releases/releases/latest").tag_name
          if (-not $LatestVersion) {
            Write-Host -ForegroundColor Red "Failed to fetch the latest release version from GitHub. Please check your internet connection."
            exit 1
          }

          $InstalledVersion = $null
          $UninstallKeys = Get-ChildItem -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall" -ErrorAction SilentlyContinue
          foreach ($Key in $UninstallKeys) {
            $KeyData = Get-ItemProperty -Path $Key.PSPath -ErrorAction SilentlyContinue
            if ($KeyData.DisplayName -match "nrdot-collector") {
              $InstalledVersion = $KeyData.DisplayVersion
              break
            }
          }

          if ($InstalledVersion) {
            Write-Host -ForegroundColor Yellow "nrdot-collector is already installed (version $InstalledVersion). Skipping installation - this recipe does not modify an existing nrdot-collector install, since some environments intentionally pin a specific collector version."
            Write-Host -ForegroundColor Yellow "To manually upgrade to the latest version ($LatestVersion), follow the install/upgrade steps at: https://docs.newrelic.com/docs/opentelemetry/database/mssql/windows-hosted/"
            exit 0
          }

          Write-Host "Installing nrdot-collector version: $LatestVersion"

          $MsiPath = "$env:TEMP\nrdot-collector.msi"
          $LogPath = "$env:TEMP\nrdot_install.log"
          $DownloadUrl = "https://github.com/newrelic/nrdot-collector-releases/releases/download/$LatestVersion/nrdot-collector_${LatestVersion}_windows_x64.msi"
          Write-Host "Downloading from: $DownloadUrl"

          $WebClient = New-Object System.Net.WebClient
          $WebClient.Headers.Add("User-Agent", "Mozilla/5.0")
          if ($env:HTTPS_PROXY) {
            $WebClient.Proxy = New-Object System.Net.WebProxy($env:HTTPS_PROXY, $true)
          }
          try {
            $WebClient.DownloadFile($DownloadUrl, $MsiPath)
          } catch {
            Write-Host -ForegroundColor Red "Failed to download the nrdot-collector package: $_"
            exit 1
          }

          $Process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/i `"$MsiPath`" /qn /norestart /L*V `"$LogPath`"" -Wait -NoNewWindow -PassThru
          if ($Process.ExitCode -ne 0) {
            Write-Host -ForegroundColor Red "msiexec failed with exit code $($Process.ExitCode). See $LogPath for details."
            exit $Process.ExitCode
          }

          Remove-Item -Path $MsiPath -ErrorAction SilentlyContinue

          $Service = Get-Service -Name $CollectorService -ErrorAction SilentlyContinue
          if (-not $Service) {
            Write-Host -ForegroundColor Red "nrdot-collector service was not found after installation."
            exit 1
          }

          Write-Host "nrdot-collector installed successfully."
          PSEOF

    configure_database_user:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $server = "{{.NR_CLI_MSSQL_SERVER}}"
          $port = "{{.NR_CLI_MSSQL_PORT}}"
          $sqlFile = "$env:TEMP\nr-mssql-grant.sql"
          $pwFile = "$env:TEMP\nr-mssql-newrelic-pw.tmp"

          function Invoke-GrantScript($connArgs, $file) {
            $result = & sqlcmd @connArgs -i $file 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host -ForegroundColor Red "SQL script failed:"
              Write-Host $result
              exit 1
            }
            Write-Host $result
          }

          if ($mode -eq "1") {
            $loginName = "{{.NR_CLI_MSSQL_LOGIN_NAME}}"
            $chars = (48..57) + (65..90) + (97..122)
            $NrPassword = -join ($chars | Get-Random -Count 24 | ForEach-Object {[char]$_})
            $NrPassword | Set-Content -Path $pwFile -NoNewline

            $sql = @"
          USE [master];
          GO
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '$loginName')
            CREATE LOGIN [$loginName] WITH PASSWORD = '$NrPassword';
          ELSE
            ALTER LOGIN [$loginName] WITH PASSWORD = '$NrPassword';
          GO
          GRANT VIEW SERVER STATE TO [$loginName];
          GRANT VIEW ANY DEFINITION TO [$loginName];
          GRANT VIEW ANY DATABASE TO [$loginName];
          GO
          DECLARE @name SYSNAME;
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name]
          FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master', 'msdb', 'model', 'rdsadmin', 'distribution')
          AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              EXEC('USE [' + @name + '];
              IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''$loginName'')
              BEGIN
                CREATE USER [$loginName] FOR LOGIN [$loginName];
              END;
              GRANT VIEW DATABASE STATE TO [$loginName];');
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-U", "sa", "-P", "{{.NR_CLI_MSSQL_SA_PASSWORD}}", "-C") $sqlFile
          }
          elseif ($mode -eq "2") {
            $account = "{{.NR_CLI_MSSQL_WIN_ACCOUNT}}"
            $sql = @"
          USE [master];
          GO
          GRANT VIEW SERVER STATE TO [$account];
          GRANT VIEW ANY DEFINITION TO [$account];
          GRANT VIEW ANY DATABASE TO [$account];
          GO
          DECLARE @name SYSNAME;
          DECLARE @sql NVARCHAR(MAX);
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name]
          FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master', 'msdb', 'model', 'rdsadmin', 'distribution')
            AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              SET @sql = '
                USE [' + @name + '];
                IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''$account'')
                BEGIN
                  CREATE USER [$account] FOR LOGIN [$account];
                END;
                GRANT VIEW DATABASE STATE TO [$account];
                GRANT VIEW DEFINITION TO [$account];
                ALTER ROLE db_datareader ADD MEMBER [$account];';
              EXEC sp_executesql @sql;
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-E", "-C") $sqlFile
          }
          else {
            $gmsa = "{{.NR_CLI_MSSQL_GMSA_ACCOUNT}}"
            $sql = @"
          USE master;
          GO
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '$gmsa')
            CREATE LOGIN [$gmsa] FROM WINDOWS;
          GO
          GRANT VIEW SERVER STATE TO [$gmsa];
          GRANT VIEW ANY DEFINITION TO [$gmsa];
          GRANT VIEW ANY DATABASE TO [$gmsa];
          GO
          DECLARE @name SYSNAME;
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
          SELECT [name] FROM [master].[sys].[databases]
          WHERE [name] NOT IN ('master','msdb','model','rdsadmin','distribution')
          AND [state] = 0;
          OPEN db_cursor;
          FETCH NEXT FROM db_cursor INTO @name;
          WHILE @@FETCH_STATUS = 0
          BEGIN
            BEGIN TRY
              EXEC('USE [' + @name + '];
              IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = ''$gmsa'')
              BEGIN
                CREATE USER [$gmsa] FOR LOGIN [$gmsa];
              END;
              GRANT VIEW DATABASE STATE TO [$gmsa];');
            END TRY
            BEGIN CATCH
              PRINT 'Error on ' + @name + ': ' + ERROR_MESSAGE();
            END CATCH
            FETCH NEXT FROM db_cursor INTO @name;
          END
          CLOSE db_cursor;
          DEALLOCATE db_cursor;
          GO
          "@
            $sql | Set-Content -Path $sqlFile
            Invoke-GrantScript @("-S", "$server,$port", "-E", "-C") $sqlFile
          }

          Remove-Item -Path $sqlFile -ErrorAction SilentlyContinue
          Write-Host "SQL Server monitoring identity configured successfully."
          PSEOF

    configure_service_identity:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $service = "nrdot-collector"

          if ($mode -eq "1") {
            Write-Host "SQL Server Auth selected - service logon account left unchanged (LocalSystem)."
            exit 0
          }

          if ($mode -eq "2") {
            $account = "{{.NR_CLI_MSSQL_WIN_ACCOUNT}}"
            $password = "{{.NR_CLI_MSSQL_WIN_PASSWORD}}"
          } else {
            $account = "{{.NR_CLI_MSSQL_GMSA_ACCOUNT}}"
            $password = ""
          }

          Stop-Service -Name $service -Force -ErrorAction SilentlyContinue

          cmd /c "sc config `"$service`" obj= `"$account`" password= `"$password`""
          if ($LASTEXITCODE -ne 0) {
            Write-Host -ForegroundColor Red "Failed to configure the nrdot-collector service to run as $account."
            exit 1
          }

          $svcInfo = Get-WmiObject Win32_Service -Filter "Name='$service'"
          Write-Host "nrdot-collector service logon account set to: $($svcInfo.StartName)"

          Start-Service -Name $service
          PSEOF

    create_collector_config:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $mode = "{{.NR_CLI_MSSQL_AUTH_MODE}}"
          $preset = "{{.NR_CLI_MSSQL_CONFIG_PRESET}}"
          $server = "{{.NR_CLI_MSSQL_SERVER}}"
          $port = "{{.NR_CLI_MSSQL_PORT}}"
          $region = "{{.NEW_RELIC_REGION}}"
          $licenseKey = "{{.NEW_RELIC_LICENSE_KEY}}"
          $configDir = "C:\Program Files\nrdot-collector"
          $configPath = "$configDir\mssql-config.yaml"
          $pwFile = "$env:TEMP\nr-mssql-newrelic-pw.tmp"

          New-Item -Path $configDir -ItemType Directory -Force | Out-Null

          $interval = if ($preset -eq "2") { "30s" } else { "15s" }

          if ($mode -eq "1") {
            $loginName = "{{.NR_CLI_MSSQL_LOGIN_NAME}}"
            $NrPassword = (Get-Content -Path $pwFile -Raw)
            $receiverFields = "    collection_interval: $interval`n    username: $loginName`n    password: $NrPassword`n    server: $server`n    port: $port"
          } else {
            $receiverFields = "    collection_interval: $interval`n    datasource: `"server=$server;port=$port;integrated security=true;encrypt=true;TrustServerCertificate=true;`""
          }

          switch ($region) {
            "staging" { $otlpEndpoint = "https://staging-otlp.nr-data.net" }
            "EU"      { $otlpEndpoint = "https://otlp.eu01.nr-data.net" }
            "JP"      { $otlpEndpoint = "https://otlp.jp.nr-data.net" }
            default   { $otlpEndpoint = "https://otlp.nr-data.net" }
          }

          if ($preset -eq "2") {
            $template = @'
          extensions:
            health_check:

          receivers:
            otlp:
              protocols:
                grpc:
                http:

            host_metrics:
              collection_interval: 30s
              scrapers:
                cpu:
                  metrics:
                    system.cpu.time:
                      enabled: false
                    system.cpu.utilization:
                      enabled: true
                load:
                memory:
                  metrics:
                    system.memory.utilization:
                      enabled: true
                paging:
                  metrics:
                    system.paging.utilization:
                      enabled: false
                    system.paging.faults:
                      enabled: false
                disk:
                  metrics:
                    system.disk.merged:
                      enabled: false
                    system.disk.pending_operations:
                      enabled: false
                    system.disk.weighted_io_time:
                      enabled: false
                network:
                  metrics:
                    system.network.connections:
                      enabled: false
                processes:
                process:
                  mute_process_name_error: true
                  mute_process_exe_error: true
                  mute_process_user_error: true
                  mute_process_io_error: true
                  metrics:
                    process.cpu.utilization:
                      enabled: true
                    process.memory.utilization:
                      enabled: true

            nrsqlserver:
          __RECEIVER_FIELDS__
              metrics:
                sqlserver.database.count:
                  enabled: true
                sqlserver.database.file.size:
                  enabled: true
                sqlserver.database.io:
                  enabled: true
                sqlserver.database.latency:
                  enabled: true
                sqlserver.database.operations:
                  enabled: true
                sqlserver.database.transactions.active:
                  enabled: true
                sqlserver.database.backup_or_restore.rate:
                  enabled: true
                sqlserver.database.execution.errors:
                  enabled: true
                sqlserver.database.full_scan.rate:
                  enabled: true
                sqlserver.database.tempdb.space:
                  enabled: true
                sqlserver.database.tempdb.version_store.size:
                  enabled: true
                sqlserver.lock.timeout.rate:
                  enabled: true
                sqlserver.lock.wait.count:
                  enabled: true
                sqlserver.deadlock.rate:
                  enabled: true
                sqlserver.transaction.delay:
                  enabled: true
                sqlserver.transaction.longest_running_time:
                  enabled: true
                sqlserver.transaction.version_cleanup.rate:
                  enabled: true
                sqlserver.transaction.version_generation.rate:
                  enabled: true
                sqlserver.memory.area:
                  enabled: true
                sqlserver.memory.cache.object.count:
                  enabled: true
                sqlserver.memory.grants.pending.count:
                  enabled: true
                sqlserver.memory.page.count:
                  enabled: true
                sqlserver.memory.target:
                  enabled: true
                sqlserver.memory.usage:
                  enabled: true
                sqlserver.os.memory.usage:
                  enabled: true
                sqlserver.os.memory.utilization:
                  enabled: true
                sqlserver.os.scheduler.runnable_tasks.count:
                  enabled: true
                sqlserver.os.wait.duration:
                  enabled: true
                sqlserver.os.wait.tasks.count:
                  enabled: true
                sqlserver.page.buffer_cache.free_list.stalls.rate:
                  enabled: true
                sqlserver.page.lookup.rate:
                  enabled: true
                sqlserver.batch.compilation.utilization:
                  enabled: true
                sqlserver.batch.page_split.utilization:
                  enabled: true
                sqlserver.recompilation.ratio:
                  enabled: true
                sqlserver.parameterization.rate:
                  enabled: true
                sqlserver.plan.execution.rate:
                  enabled: true
                sqlserver.attention.rate:
                  enabled: true
                sqlserver.process.count:
                  enabled: true
                sqlserver.processes.blocked:
                  enabled: true
                sqlserver.login.rate:
                  enabled: true
                sqlserver.logout.rate:
                  enabled: true
                sqlserver.thread_pool.tasks.count:
                  enabled: true
                sqlserver.thread_pool.workers.count:
                  enabled: true
                sqlserver.thread_pool.workers.max:
                  enabled: true
                sqlserver.thread_pool.workers.utilization:
                  enabled: true
                sqlserver.tempdb.allocation.wait_time.total:
                  enabled: true
                sqlserver.tempdb.contention.waiters.count:
                  enabled: true
                sqlserver.tempdb.data_files.count:
                  enabled: true
                sqlserver.tempdb.file.size:
                  enabled: true
                sqlserver.tempdb.space.usage:
                  enabled: true
                sqlserver.latch.superlatch.count:
                  enabled: true
                sqlserver.latch.superlatch.transition.rate:
                  enabled: true
                sqlserver.latch.wait.rate:
                  enabled: true
                sqlserver.latch.wait_time.avg:
                  enabled: true
                sqlserver.latch.wait_time.total:
                  enabled: true
                sqlserver.index.search.rate:
                  enabled: true
                sqlserver.resource_pool.disk.operations:
                  enabled: true
                sqlserver.resource_pool.disk.throttled.read.rate:
                  enabled: true
                sqlserver.resource_pool.disk.throttled.write.rate:
                  enabled: true
                sqlserver.replica.data.rate:
                  enabled: true
                sqlserver.failover_cluster.ag.cluster_type:
                  enabled: true
                sqlserver.failover_cluster.ag.failure_condition_level:
                  enabled: true
                sqlserver.failover_cluster.ag.health_check_timeout:
                  enabled: true
                sqlserver.failover_cluster.ag.required_sync_secondaries:
                  enabled: true
                sqlserver.failover_cluster.replica.database.queue_size:
                  enabled: true
                sqlserver.failover_cluster.replica.database.redo.rate:
                  enabled: true
                sqlserver.failover_cluster.replica.flow_control_time:
                  enabled: true
                sqlserver.failover_cluster.replica.role:
                  enabled: true
                sqlserver.failover_cluster.replica.synchronization_health:
                  enabled: true
                sqlserver.computer.uptime:
                  enabled: true
                sqlserver.cpu.count:
                  enabled: true
                sqlserver.table.count:
                  enabled: true
                sqlserver.kill_connection.error.rate:
                  enabled: true

              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true

              top_query_collection:
                lookback_time: 60s
                max_query_sample_count: 500
                top_query_count: 200
                collection_interval: 60s

              collect_full_query_text: true
              allowed_comment_keys:
                - nr_service_guid

              query_sample_collection:
                max_rows_per_query: 100

          processors:
            metrics_transform:
              transforms:
                - include: system.cpu.utilization
                  action: update
                  operations:
                    - action: aggregate_labels
                      label_set: [state]
                      aggregation_type: mean
                - include: system.paging.operations
                  action: update
                  operations:
                    - action: aggregate_labels
                      label_set: [direction]
                      aggregation_type: sum

            filter/exclude_cpu_utilization:
              metrics:
                datapoint:
                  - 'metric.name == "system.cpu.utilization" and attributes["state"] == "interrupt"'
                  - 'metric.name == "system.cpu.utilization" and attributes["state"] == "nice"'
                  - 'metric.name == "system.cpu.utilization" and attributes["state"] == "softirq"'

            filter/exclude_memory_utilization:
              metrics:
                datapoint:
                  - 'metric.name == "system.memory.utilization" and attributes["state"] == "slab_unreclaimable"'
                  - 'metric.name == "system.memory.utilization" and attributes["state"] == "inactive"'
                  - 'metric.name == "system.memory.utilization" and attributes["state"] == "cached"'
                  - 'metric.name == "system.memory.utilization" and attributes["state"] == "buffered"'
                  - 'metric.name == "system.memory.utilization" and attributes["state"] == "slab_reclaimable"'

            filter/exclude_memory_usage:
              metrics:
                datapoint:
                  - 'metric.name == "system.memory.usage" and attributes["state"] == "slab_unreclaimable"'
                  - 'metric.name == "system.memory.usage" and attributes["state"] == "inactive"'

            filter/exclude_filesystem_utilization:
              metrics:
                datapoint:
                  - 'metric.name == "system.filesystem.utilization" and attributes["type"] == "squashfs"'

            filter/exclude_filesystem_usage:
              metrics:
                datapoint:
                  - 'metric.name == "system.filesystem.usage" and attributes["type"] == "squashfs"'
                  - 'metric.name == "system.filesystem.usage" and attributes["state"] == "reserved"'

            filter/exclude_filesystem_inodes_usage:
              metrics:
                datapoint:
                  - 'metric.name == "system.filesystem.inodes.usage" and attributes["type"] == "squashfs"'
                  - 'metric.name == "system.filesystem.inodes.usage" and attributes["state"] == "reserved"'

            filter/exclude_system_disk:
              metrics:
                datapoint:
                  - 'metric.name == "system.disk.operations" and IsMatch(attributes["device"], "^loop.*") == true'
                  - 'metric.name == "system.disk.merged" and IsMatch(attributes["device"], "^loop.*") == true'
                  - 'metric.name == "system.disk.io" and IsMatch(attributes["device"], "^loop.*") == true'
                  - 'metric.name == "system.disk.io_time" and IsMatch(attributes["device"], "^loop.*") == true'
                  - 'metric.name == "system.disk.operation_time" and IsMatch(attributes["device"], "^loop.*") == true'

            filter/exclude_system_paging:
              metrics:
                datapoint:
                  - 'metric.name == "system.paging.usage" and attributes["state"] == "cached"'
                  - 'metric.name == "system.paging.operations" and attributes["type"] == "cached"'

            filter/exclude_network:
              metrics:
                datapoint:
                  - 'IsMatch(metric.name, "^system.network.*") == true and attributes["device"] == "lo"'

            attributes/exclude_system_paging:
              include:
                match_type: strict
                metric_names:
                  - system.paging.operations
              actions:
                - key: type
                  action: delete

            cumulativetodelta:

            transform/host:
              metric_statements:
                - context: metric
                  statements:
                    - set(metric.description, "")
                    - set(metric.unit, "")

            batch:

            resource_detection:
              detectors: ["system"]
              system:
                hostname_sources: ["os"]
                resource_attributes:
                  host.id:
                    enabled: true

            resource_detection/cloud:
              detectors: ["gcp", "ec2", "azure"]
              timeout: 2s
              override: true

            resource_detection/env:
              detectors: ["env"]
              timeout: 2s
              override: true

          exporters:
            otlphttp:
              endpoint: __OTLP_ENDPOINT__
              headers:
                api-key: __LICENSE_KEY__
              tls:
                insecure: false
              compression: gzip

          service:
            telemetry:
              metrics:
                level: none

            extensions: [health_check]

            pipelines:
              metrics/host:
                receivers: [host_metrics, nrsqlserver]
                processors:
                  - metrics_transform
                  - filter/exclude_cpu_utilization
                  - filter/exclude_memory_utilization
                  - filter/exclude_memory_usage
                  - filter/exclude_filesystem_utilization
                  - filter/exclude_filesystem_usage
                  - filter/exclude_filesystem_inodes_usage
                  - filter/exclude_system_disk
                  - filter/exclude_network
                  - attributes/exclude_system_paging
                  - transform/host
                  - resource_detection
                  - resource_detection/cloud
                  - resource_detection/env
                  - cumulativetodelta
                  - batch
                exporters: [otlphttp]

              logs/host:
                receivers: [nrsqlserver]
                processors:
                  - resource_detection
                  - resource_detection/cloud
                  - resource_detection/env
                  - batch
                exporters: [otlphttp]

              traces:
                receivers: [otlp]
                processors: [resource_detection, resource_detection/cloud, resource_detection/env, batch]
                exporters: [otlphttp]

              metrics:
                receivers: [otlp]
                processors: [resource_detection, resource_detection/cloud, resource_detection/env, batch]
                exporters: [otlphttp]

              logs:
                receivers: [otlp]
                processors: [resource_detection, resource_detection/cloud, resource_detection/env, batch]
                exporters: [otlphttp]
          '@
          } else {
            $template = @'
          receivers:
            nrsqlserver:
          __RECEIVER_FIELDS__
              metrics:
                sqlserver.database.count:
                  enabled: true
                sqlserver.database.io:
                  enabled: true
                sqlserver.database.latency:
                  enabled: true
                sqlserver.database.operations:
                  enabled: true
                sqlserver.database.tempdb.space:
                  enabled: true
                sqlserver.database.tempdb.version_store.size:
                  enabled: true
                sqlserver.deadlock.rate:
                  enabled: true
                sqlserver.os.wait.duration:
                  enabled: true
                sqlserver.processes.blocked:
                  enabled: true
                sqlserver.memory.grants.pending.count:
                  enabled: true
                sqlserver.database.file.size:
                  enabled: true
                sqlserver.memory.area:
                  enabled: true

              events:
                db.server.query_sample:
                  enabled: true
                db.server.top_query:
                  enabled: true

              top_query_collection:
                lookback_time: 60s
                max_query_sample_count: 1000
                top_query_count: 250
                collection_interval: 60s

              collect_full_query_text: true
              allowed_comment_keys:
                - nr_service_guid

              query_sample_collection:
                max_rows_per_query: 100

          processors:
            memory_limiter:
              check_interval: ${env:NR_MEM_LIMITER_CHECK_INTERVAL:-1s}
              limit_mib:       ${env:NR_MEM_LIMITER_LIMIT_MIB:-200}
              spike_limit_mib: ${env:NR_MEM_LIMITER_SPIKE_MIB:-50}

            batch:

          exporters:
            otlphttp:
              endpoint: __OTLP_ENDPOINT__
              headers:
                api-key: __LICENSE_KEY__
              tls:
                insecure: false
              compression: gzip

          service:
            telemetry:
              metrics:
                level: none

            pipelines:
              metrics:
                receivers: [nrsqlserver]
                processors: [memory_limiter, batch]
                exporters: [otlphttp]

              logs:
                receivers: [nrsqlserver]
                processors: [memory_limiter, batch]
                exporters: [otlphttp]
          '@
          }

          $configText = $template.Replace('__RECEIVER_FIELDS__', $receiverFields).Replace('__OTLP_ENDPOINT__', $otlpEndpoint).Replace('__LICENSE_KEY__', $licenseKey)
          $configText | Set-Content -Path $configPath -Encoding utf8

          if ($mode -eq "1") {
            Remove-Item -Path $pwFile -ErrorAction SilentlyContinue
          }

          Write-Host "MSSQL OTel config written to $configPath"
          PSEOF

    configure_service:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $service = "nrdot-collector"
          $exePath = "C:\Program Files\nrdot-collector\nrdot-collector.exe"
          $configPath = "C:\Program Files\nrdot-collector\mssql-config.yaml"
          $regPath = "HKLM:\SYSTEM\CurrentControlSet\Services\nrdot-collector"

          $existingImagePath = (Get-ItemProperty -Path $regPath -Name "ImagePath" -ErrorAction SilentlyContinue).ImagePath

          if ($existingImagePath -and $existingImagePath -match [regex]::Escape("mssql-config.yaml")) {
            Write-Host "nrdot-collector service is already configured to use mssql-config.yaml."
          } else {
            $newImagePath = "`"$exePath`" --config `"$configPath`""
            Set-ItemProperty -Path $regPath -Name "ImagePath" -Value $newImagePath
            Write-Host "nrdot-collector service ImagePath updated to use mssql-config.yaml."
          }

          $validateOutput = & $exePath validate --config="$configPath" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host -ForegroundColor Red "mssql-config.yaml failed validation:"
            Write-Host $validateOutput
            exit 1
          }
          Write-Host "mssql-config.yaml validated successfully."
          PSEOF

    restart_nrdot:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          net stop nrdot-collector
          net start nrdot-collector
          PSEOF

    assert_nrdot_status_ok:
      cmds:
        - |
          powershell -NoProfile -Command - <<'PSEOF'
          $maxRetries = 30
          $tries = 0
          Write-Host "Waiting for NRDOT Collector to start..."
          while ($tries -lt $maxRetries) {
            $tries++
            $service = Get-Service -Name "nrdot-collector" -ErrorAction SilentlyContinue
            if ($service -and $service.Status -eq "Running") {
              Write-Host "NRDOT Collector is running."
              exit 0
            }
            Start-Sleep -Seconds 2
          }
          Write-Host -ForegroundColor Red "NRDOT Collector did not start in time. Install log:"
          Get-Content "$env:TEMP\nrdot_install.log" -ErrorAction SilentlyContinue | Select-Object -Last 50
          exit 31
          PSEOF

    default:
      cmds:
        - task: write_recipe_metadata
        - task: assert_pre_req
        - task: assert_auth_inputs
        - task: assert_sql_server_version
        - task: install_nrdot
        - task: configure_database_user
        - task: configure_service_identity
        - task: create_collector_config
        - task: configure_service
        - task: restart_nrdot
        - task: assert_nrdot_status_ok

postInstall:
  info: |2
      MSSQL OTel config: C:\Program Files\nrdot-collector\mssql-config.yaml
      Service status:    Get-Service nrdot-collector
      Restart service:   net stop nrdot-collector; net start nrdot-collector