# Visit our schema definition for additional information on this file format.
# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: nrdot-kafka
displayName: NRDOT Kafka
description: New Relic install recipe for Kafka monitoring via NRDOT Collector on Debian/Ubuntu.
repository: https://github.com/newrelic/nrdot-collector-releases

installTargets:
  - type: host
    os: linux
    platformFamily: debian
  - type: host
    os: linux
    platform: ubuntu

keywords:
  - Kafka
  - NRDOT
  - OpenTelemetry
  - OTel
  - Messaging
  - Linux
  - Debian
  - Ubuntu

processMatch: []

preInstall:
  discoveryMode:
    - targeted

validationNrql: "SELECT count(*) FROM Metric WHERE kafka.cluster.name = '{{.NR_CLI_KAFKA_CLUSTER_NAME}}' SINCE 10 minutes ago"

install:
  version: "3"
  silent: true

  vars:
    IS_SYSTEMCTL:
      sh: command -v systemctl | wc -l
    NRDOT_ARCH:
      sh: if [ "$(uname -m)" = "aarch64" ]; then echo "arm64"; else echo "amd64"; fi
    NRDOT_VERSION:
      sh: curl -sf "https://api.github.com/repos/newrelic/nrdot-collector-releases/releases/latest" | grep tag_name | cut -d '"' -f 4 | sed 's/^v//' || echo "1.11.1"
    COLLECTOR_DISTRO: "nrdot-collector"
    CONFIG_DIR: "/etc/nrdot-collector"
    OTL_DIR: "/opt/opentelemetry"
    JMX_CONFIG_URL: "https://raw.githubusercontent.com/newrelic/newrelic-opentelemetry-examples/main/other-examples/collector/kafka/self-host-kafka/jmx-custom-config.yaml"
    COLLECTOR_CONFIG_URL: "https://raw.githubusercontent.com/newrelic/newrelic-opentelemetry-examples/main/other-examples/collector/kafka/self-host-kafka/otel-collector-config.yaml"

  tasks:
    default:
      cmds:
        - task: write_recipe_metadata
        - task: assert_pre_req
        - task: install_nrdot
        - task: download_java_agent
        - task: create_jmx_config
        - task: create_collector_config
        - task: configure_service
        - task: restart_nrdot
        - task: assert_nrdot_status_ok

    write_recipe_metadata:
      cmds:
        - |
          echo '{"Metadata":{"CapturedCliOutput":"true"}}' | tee {{.NR_CLI_OUTPUT}} > /dev/null

    assert_pre_req:
      cmds:
        - |
          IS_ROOT_OR_SUDO=$([ ! -z "$SUDO_USER" ] || [ $(whoami) = "root" ] && echo "true" || echo "false")
          if [ "$IS_ROOT_OR_SUDO" = "false" ]; then
            echo "This newrelic install must be run under sudo or root" >&2
            exit 3
          fi
        - |
          BITS=$(getconf LONG_BIT)
          if [ "$BITS" != "64" ]; then
            echo "64-bit architecture is required. Detected: ${BITS}-bit system" >&2
            exit 131
          fi
        - |
          IS_CURL_INSTALLED=$(which curl | wc -l)
          if [ $IS_CURL_INSTALLED -eq 0 ] ; then
            echo "curl is required. Please install curl and re-run the installation." >&2
            exit 16
          fi
        - |
          LEVEL="{{.NR_CLI_MONITORING_LEVEL}}"
          if [ "$LEVEL" != "complete" ] && [ "$LEVEL" != "minimal" ]; then
            echo "NR_CLI_MONITORING_LEVEL must be 'complete' or 'minimal'. Got: $LEVEL" >&2
            exit 1
          fi

    install_nrdot:
      cmds:
        - |
          echo "Installing NRDOT Collector v{{.NRDOT_VERSION}}..."
          NRDOT_DEB="/tmp/{{.COLLECTOR_DISTRO}}_{{.NRDOT_VERSION}}_linux_{{.NRDOT_ARCH}}.deb"
          curl "https://github.com/newrelic/nrdot-collector-releases/releases/download/{{.NRDOT_VERSION}}/{{.COLLECTOR_DISTRO}}_{{.NRDOT_VERSION}}_linux_{{.NRDOT_ARCH}}.deb" \
            --location --output "$NRDOT_DEB" 2>/dev/null
          dpkg -i "$NRDOT_DEB" > /dev/null
          if [ $? -ne 0 ]; then
            dpkg --configure -a > /dev/null
            apt-get -o DPkg::Lock::Timeout=60 install -f -y > /dev/null
          fi
          rm -f "$NRDOT_DEB"
          mkdir -p {{.CONFIG_DIR}}
          grep -q "^NEW_RELIC_LICENSE_KEY" {{.CONFIG_DIR}}/{{.COLLECTOR_DISTRO}}.conf 2>/dev/null && \
            sed -i 's|^NEW_RELIC_LICENSE_KEY=.*|NEW_RELIC_LICENSE_KEY={{.NEW_RELIC_LICENSE_KEY}}|' \
              {{.CONFIG_DIR}}/{{.COLLECTOR_DISTRO}}.conf || \
            echo "NEW_RELIC_LICENSE_KEY={{.NEW_RELIC_LICENSE_KEY}}" | \
              tee -a {{.CONFIG_DIR}}/{{.COLLECTOR_DISTRO}}.conf > /dev/null

    download_java_agent:
      cmds:
        - |
          echo "Downloading OpenTelemetry Java agent..."
          mkdir -p {{.OTL_DIR}}
          AGENT_JAR="{{.OTL_DIR}}/opentelemetry-javaagent.jar"
          if [ ! -f "$AGENT_JAR" ]; then
            curl -L -o "$AGENT_JAR" \
              "https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar" 2>/dev/null
            echo "Java agent downloaded to $AGENT_JAR"
          else
            echo "Java agent already present, skipping download."
          fi

    create_jmx_config:
      cmds:
        - |
          LEVEL="{{.NR_CLI_MONITORING_LEVEL}}"
          JMX_CONFIG="{{.CONFIG_DIR}}/jmx-custom-config.yaml"
          echo "Downloading JMX config..."
          if [ "$LEVEL" = "minimal" ]; then
            curl -sf "{{.JMX_CONFIG_URL}}" | sed '/Additional metrics/,$d' > "$JMX_CONFIG"
          else
            curl -sf "{{.JMX_CONFIG_URL}}" -o "$JMX_CONFIG"
          fi
          echo "JMX config written to $JMX_CONFIG"

    create_collector_config:
      cmds:
        - |
          LEVEL="{{.NR_CLI_MONITORING_LEVEL}}"
          COLLECTOR_CONFIG="{{.CONFIG_DIR}}/kafka-collector-config.yaml"
          KAFKA_ENV_FILE="{{.CONFIG_DIR}}/kafka-env.conf"

          echo "Downloading collector config..."
          curl -sf "{{.COLLECTOR_CONFIG_URL}}" -o "$COLLECTOR_CONFIG"

          printf "KAFKA_BOOTSTRAP_BROKER_ADDRESSES={{.NR_CLI_KAFKA_BOOTSTRAP_BROKERS}}\n" > "$KAFKA_ENV_FILE"
          printf "KAFKA_CLUSTER_NAME={{.NR_CLI_KAFKA_CLUSTER_NAME}}\n" >> "$KAFKA_ENV_FILE"
          printf "NEW_RELIC_OTLP_ENDPOINT=${NR_CLI_OTLP_ENDPOINT:-https://otlp.nr-data.net:4317}\n" >> "$KAFKA_ENV_FILE"
          printf "KAFKA_METRICS_COLLECTION_INTERVAL=30s\n" >> "$KAFKA_ENV_FILE"

          if [ "$LEVEL" = "minimal" ]; then
            awk '
              /kafka\.partition\.current_offset:/ { found=1 }
              found && /enabled: false/ {
                print
                print "      kafka.consumer_group.offset:"
                print "        enabled: false"
                print "      kafka.consumer_group.offset_sum:"
                print "        enabled: false"
                found=0
                next
              }
              { print }
            ' "$COLLECTOR_CONFIG" > "${COLLECTOR_CONFIG}.tmp" && \
              mv "${COLLECTOR_CONFIG}.tmp" "$COLLECTOR_CONFIG"
          fi
          echo "Collector config written to $COLLECTOR_CONFIG"

    configure_service:
      cmds:
        - |
          if [ {{.IS_SYSTEMCTL}} -gt 0 ]; then
            DROPIN_DIR="/etc/systemd/system/{{.COLLECTOR_DISTRO}}.service.d"
            mkdir -p "$DROPIN_DIR"
            NRDOT_BIN=$(command -v nrdot-collector 2>/dev/null || echo "/usr/bin/nrdot-collector")
            {
              printf '[Service]\n'
              printf 'EnvironmentFile={{.CONFIG_DIR}}/kafka-env.conf\n'
              printf 'ExecStart=\n'
              printf 'ExecStart=%s --config {{.CONFIG_DIR}}/kafka-collector-config.yaml\n' "$NRDOT_BIN"
            } > "$DROPIN_DIR/kafka-config.conf"
            systemctl daemon-reload
            echo "Systemd drop-in configured."
          else
            echo "systemctl not found - systemd is required for service management." >&2
            exit 1
          fi

    restart_nrdot:
      cmds:
        - |
          systemctl reload-or-restart {{.COLLECTOR_DISTRO}}.service

    assert_nrdot_status_ok:
      cmds:
        - |
          MAX_RETRIES=30
          TRIES=0
          echo "Waiting for NRDOT Collector to start..."
          while [ $TRIES -lt $MAX_RETRIES ]; do
            TRIES=$((TRIES + 1))
            if systemctl is-active --quiet {{.COLLECTOR_DISTRO}}.service; then
              echo "NRDOT Collector is running."
              exit 0
            fi
            sleep 2
          done
          echo "NRDOT Collector did not start in time. Check logs:" >&2
          journalctl -u {{.COLLECTOR_DISTRO}}.service --no-pager -n 50 >&2
          exit 31
