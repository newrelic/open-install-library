# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: mssql-otel-windows-installer
displayName: Microsoft SQL Server OTel Integration (Windows)
description: |
  Sets up Microsoft SQL Server monitoring via the New Relic NRDOT Collector.
  Downloads and installs the NRDOT Collector MSI on this Windows host.
repository: https://github.com/newrelic-forks/nrdot-collector-components/tree/feature/otel-mssql-qpm-receiver/receiver/newrelicsqlserverreceiver
installTargets:
  - type: host
    os: windows

keywords:
  - OTel
  - OpenTelemetry
  - SqlServer
  - MSSQL
  - Windows
  - NRDOT

processMatch: []

install:
  version: "3"
  silent: true

  tasks:
    default:
      cmds:
        - task: assert_sqlcmd
        - task: prompt_and_save_config
        - task: assert_db_version
        - task: install_nrdot

    # ── Prompt user for SQL Server connection details ─────────────────────────
    prompt_and_save_config:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "=== SQL Server Connection Configuration ==="
          Write-Host ""

          $Hostname = Read-Host "SQL Server hostname or IP address (press Enter for localhost)"
          if ([string]::IsNullOrWhiteSpace($Hostname)) { $Hostname = "localhost" }

          $Port = Read-Host "SQL Server port (press Enter for 1433)"
          if ([string]::IsNullOrWhiteSpace($Port)) { $Port = "1433" }

          Write-Host ""
          Write-Host "Authentication Method:"
          Write-Host "  1. Windows Authentication (for local or domain SQL Server)"
          Write-Host "  2. SQL Server Authentication (for remote SQL Server)"
          $AuthChoice = Read-Host "Enter choice (1 or 2, press Enter for 1)"
          if ([string]::IsNullOrWhiteSpace($AuthChoice)) { $AuthChoice = "1" }
          if ($AuthChoice -ne "1" -and $AuthChoice -ne "2") {
            Write-Host ""
            Write-Host "ERROR: Invalid choice '$AuthChoice'. Enter 1 for Windows Authentication or 2 for SQL Authentication."
            Write-Host ""
            exit 1
          }

          $Username = ""
          $Password = ""

          if ($AuthChoice -eq "2") {
            $Username = Read-Host "SQL Server username"
            $SecurePassword = Read-Host "SQL Server password" -AsSecureString
            $BSTR = [System.Runtime.InteropServices.Marshal]::SecureStringToBSTR($SecurePassword)
            $Password = [System.Runtime.InteropServices.Marshal]::PtrToStringAuto($BSTR)
            [System.Runtime.InteropServices.Marshal]::ZeroFreeBSTR($BSTR)
            
            # Test connection immediately
            Write-Host ""
            Write-Host "Testing connection to SQL Server..."
            $testQuery = "SELECT @@VERSION"
            $testResult = sqlcmd -S "$Hostname,$Port" -U $Username -P $Password -Q $testQuery -h -1 -W 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Connection test failed!"
              Write-Host "Please verify:"
              Write-Host "  - Server address: $Hostname"
              Write-Host "  - Port: $Port"
              Write-Host "  - Username: $Username"
              Write-Host "  - Password is correct"
              Write-Host "  - SQL Server is running and accessible"
              Write-Host ""
              Read-Host "Press Enter to exit"
              exit 1
            }
            Write-Host "Connection successful!"
          }

          Write-Host ""
          Write-Host "Configuration saved:"
          Write-Host ("  Hostname: " + $Hostname)
          Write-Host ("  Port: " + $Port)
          Write-Host ("  Auth: " + $(if ($AuthChoice -eq "1") { "Windows Authentication" } else { "SQL Authentication (user: $Username)" }))
          Write-Host ""

          # Save to environment variables for next task
          [System.Environment]::SetEnvironmentVariable("NR_CLI_MSSQL_HOSTNAME", $Hostname, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_MSSQL_PORT", $Port, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_DB_USERNAME", $Username, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_DB_PASSWORD", $Password, "Process")

          # Also save to a temp file as backup
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          $configContent = "HOSTNAME=$Hostname`nPORT=$Port`nUSERNAME=$Username`nPASSWORD=$Password"
          [System.IO.File]::WriteAllText($configFile, $configContent, [System.Text.Encoding]::UTF8)
          '

    # ── Check sqlcmd is installed ─────────────────────────────────────────────
    assert_sqlcmd:
      cmds:
        - |
          powershell -command '
          if (Get-Command sqlcmd -ErrorAction SilentlyContinue) {
            Write-Host ("sqlcmd found: " + (Get-Command sqlcmd).Source)
            exit 0
          }
          Write-Host ""
          Write-Host "ERROR: sqlcmd is not installed or not in PATH."
          Write-Host ""
          Write-Host "sqlcmd is required to create the SQL Server monitoring login."
          Write-Host "Install it using one of the following methods:"
          Write-Host ""
          Write-Host "  Option 1 - SQL Server Command Line Tools (recommended):"
          Write-Host "    https://learn.microsoft.com/en-us/sql/tools/sqlcmd/sqlcmd-utility"
          Write-Host ""
          Write-Host "  Option 2 - winget:"
          Write-Host "    winget install Microsoft.SQLServerCommandLineTools"
          Write-Host ""
          Write-Host "After installing, re-run this recipe."
          Write-Host ""
          exit 1
          '

    # ── Check SQL Server version (must be 2017 / v14 or later) ───────────────
    #
    # Tries Windows Authentication first (works for local or domain SQL Server).
    # If that fails, tries SQL Authentication using NR_CLI_DB_USERNAME/PASSWORD
    # if provided. If both fail, the version check is skipped with a notice.
    # ─────────────────────────────────────────────────────────────────────────
    assert_db_version:
      cmds:
        - |
          powershell -command '
          # Load config from temp file
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          if (Test-Path $configFile) {
            Get-Content $configFile -Encoding UTF8 | ForEach-Object {
              if ($_ -match "^(\w+)=(.*)$") {
                $varName = $matches[1]
                $varValue = $matches[2].Trim()
                Set-Variable -Name $varName -Value $varValue
                Write-Host ("Loaded: " + $varName + " = " + $varValue)
              }
            }
          } else {
            Write-Host "ERROR: Configuration file not found. Please re-run the installation."
            exit 1
          }

          $Server = $HOSTNAME + "," + $PORT
          $sq = [char]39
          $Query = "SET NOCOUNT ON; SELECT SERVERPROPERTY(" + $sq + "ProductMajorVersion" + $sq + ")"

          Write-Host ""
          Write-Host "Checking SQL Server version..."
          Write-Host ("  Server : " + $Server)

          # Run query using SQL Auth or Windows Auth depending on available credentials
          if ($USERNAME -and $PASSWORD) {
            Write-Host "  Using SQL Authentication..."
            $raw = sqlcmd -S $Server -U $USERNAME -P $PASSWORD -Q $Query -h -1 -W 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Failed to connect to SQL Server at $Server"
              Write-Host "  - Verify the server address and port are reachable"
              Write-Host "  - Verify the username and password are correct"
              Write-Host "  - Ensure SQL Server allows remote connections"
              Write-Host "  - Check that port $PORT is open in the firewall"
              Write-Host ""
              exit 1
            }
          } else {
            Write-Host "  Using Windows Authentication..."
            $raw = sqlcmd -S $Server -E -Q $Query -h -1 -W 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Windows Authentication failed for $Server"
              Write-Host "  - Ensure the current Windows user has access to SQL Server"
              Write-Host "  - Or re-run and choose SQL Authentication with valid credentials"
              Write-Host ""
              exit 1
            }
          }

          # Detect SQL-level errors even when sqlcmd exits 0
          if ($raw -match "Msg \d+, Level \d+") {
            Write-Host ""
            Write-Host "ERROR: SQL Server returned an error while checking version:"
            Write-Host ($raw.Trim())
            Write-Host ""
            exit 1
          }

          $majorVersionMatch = $raw -split "`n" | Where-Object { $_ -match "^\s*\d+\s*$" } | Select-Object -First 1
          $majorVersion = if ($majorVersionMatch) { $majorVersionMatch.Trim() } else { "" }

          if (-not $majorVersion -or -not ($majorVersion -match "^\d+$")) {
            Write-Host ""
            Write-Host "ERROR: Could not determine SQL Server version."
            Write-Host "  sqlcmd output: " + $raw.Trim()
            Write-Host ""
            exit 1
          }

          $major = [int]$majorVersion

          $versionMap = @{ 8="2000"; 9="2005"; 10="2008"; 11="2012"; 12="2014"; 13="2016"; 14="2017"; 15="2019"; 16="2022" }
          $friendlyVersion = if ($versionMap.ContainsKey($major)) { $versionMap[$major] } else { "Unknown" }

          Write-Host ("  Version: SQL Server " + $friendlyVersion + " (v" + $major + ")")

          if ($major -lt 14) {
            Write-Host ""
            Write-Host ("ERROR: SQL Server " + $friendlyVersion + " (v" + $major + ") is not supported.")
            Write-Host ""
            Write-Host "The New Relic MSSQL OTel integration requires SQL Server 2017 (v14) or later."
            Write-Host "Supported versions: 2017, 2019, 2022"
            Write-Host ""
            Write-Host "Please upgrade your SQL Server instance and re-run this recipe."
            Write-Host ""
            exit 1
          }

          Write-Host ("  Status : Supported (SQL Server " + $friendlyVersion + ")")
          Write-Host ""
          '

    # ── Download and install NRDOT Collector MSI ──────────────────────────────
    install_nrdot:
      cmds:
        - |
          powershell -command '
          $MsiUrl  = "https://download.newrelic.com/database-monitoring/nrdot-collector/nrdot-collector-host-windows-amd64-latest.msi"
          $MsiFile = [System.IO.Path]::Combine($env:TEMP, "nrdot-collector-host-windows-amd64-latest.msi")
          $LogFile = [System.IO.Path]::Combine($env:TEMP, "nrdot-install.log")

          Write-Host ""
          Write-Host "Downloading NRDOT Collector..."
          Write-Host ("  URL : " + $MsiUrl)
          Write-Host ""

          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest -Uri $MsiUrl -OutFile $MsiFile -UseBasicParsing -ErrorAction Stop
          $ProgressPreference = "Continue"

          if (-not (Test-Path $MsiFile)) {
            Write-Error "Download failed - MSI file not found"
            exit 1
          }
          Write-Host "Download complete."
          Write-Host ""

          Write-Host "Installing NRDOT Collector (this may take a moment)..."
          $process = Start-Process -FilePath "msiexec.exe" -ArgumentList ("/qn /i " + [char]34 + $MsiFile + [char]34 + " /l*v " + [char]34 + $LogFile + [char]34) -Wait -PassThru

          if (Test-Path $MsiFile) { Remove-Item $MsiFile -Force }

          if ($process.ExitCode -ne 0) {
            Write-Error ("MSI installation failed (exit code " + $process.ExitCode + "). Review log: " + $LogFile)
            exit 1
          }

          Write-Host "NRDOT Collector installed successfully."
          Write-Host ""
          '

postInstall:
  info: |
    NRDOT Collector installed.

    Config file : C:\Program Files (x86)\NRDOT Collector Host\config.yaml

    Troubleshooting:
      MSI install log : %TEMP%\nrdot-install.log
