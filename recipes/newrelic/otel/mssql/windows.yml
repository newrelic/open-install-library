# Visit our schema definition for additional information on this file format
# https://github.com/newrelic/open-install-library/blob/main/docs/recipe-spec/recipe-spec.md#schema-definition

name: mssql-otel-windows-installer
displayName: Microsoft SQL Server OTel Integration (Windows)
description: |
  Sets up Microsoft SQL Server monitoring via the New Relic NRDOT Collector.
  Downloads and installs the NRDOT Collector MSI on this Windows host.
repository: https://github.com/newrelic-forks/nrdot-collector-components/tree/feature/otel-mssql-qpm-receiver/receiver/newrelicsqlserverreceiver
installTargets:
  - type: host
    os: windows

keywords:
  - OTel
  - OpenTelemetry
  - SqlServer
  - MSSQL
  - Windows
  - NRDOT

processMatch: []

install:
  version: "3"
  silent: true

  tasks:
    default:
      cmds:
        - task: assert_sqlcmd
        - task: prompt_and_save_config
        - task: prompt_region_selection
        - task: prompt_license_key
        - task: prompt_monitored_databases
        - task: assert_db_version
        - task: create_monitoring_user
        - task: install_nrdot
        - task: configure_nrdot
        - task: update_config_credentials
        - task: add_compression
        - task: cleanup_traces
        - task: restart_service

    # ── Prompt user for SQL Server connection details ─────────────────────────
    prompt_and_save_config:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "=== SQL Server Connection Configuration ==="
          Write-Host ""

          $Hostname = Read-Host "SQL Server hostname or IP address (press Enter for localhost)"
          if ([string]::IsNullOrWhiteSpace($Hostname)) { $Hostname = "localhost" }

          $Port = Read-Host "SQL Server port (press Enter for 1433)"
          if ([string]::IsNullOrWhiteSpace($Port)) { $Port = "1433" }

          Write-Host ""
          Write-Host "Authentication Method:"
          Write-Host "  1. Windows Authentication (for local or domain SQL Server)"
          Write-Host "  2. SQL Server Authentication (for remote SQL Server)"
          $AuthChoice = Read-Host "Enter choice (1 or 2, press Enter for 1)"
          if ([string]::IsNullOrWhiteSpace($AuthChoice)) { $AuthChoice = "1" }
          if ($AuthChoice -ne "1" -and $AuthChoice -ne "2") {
            Write-Host ""
            Write-Host "ERROR: Invalid choice '$AuthChoice'. Enter 1 for Windows Authentication or 2 for SQL Authentication."
            Write-Host ""
            exit 1
          }

          $Username = ""
          $Password = ""

          if ($AuthChoice -eq "2") {
            $Username = Read-Host "SQL Server username"
            $SecurePassword = Read-Host "SQL Server password" -AsSecureString
            $BSTR = [System.Runtime.InteropServices.Marshal]::SecureStringToBSTR($SecurePassword)
            $Password = [System.Runtime.InteropServices.Marshal]::PtrToStringAuto($BSTR)
            [System.Runtime.InteropServices.Marshal]::ZeroFreeBSTR($BSTR)
            
            # Test connection immediately
            Write-Host ""
            Write-Host "Testing connection to SQL Server..."
            $testQuery = "SELECT @@VERSION"
            $testResult = sqlcmd -S "$Hostname,$Port" -U $Username -P $Password -Q $testQuery -h -1 -W 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Connection test failed!"
              Write-Host "Please verify:"
              Write-Host "  - Server address: $Hostname"
              Write-Host "  - Port: $Port"
              Write-Host "  - Username: $Username"
              Write-Host "  - Password is correct"
              Write-Host "  - SQL Server is running and accessible"
              Write-Host ""
              Read-Host "Press Enter to exit"
              exit 1
            }
            Write-Host "Connection successful!"
          }

          Write-Host ""
          Write-Host "Configuration saved:"
          Write-Host ("  Hostname: " + $Hostname)
          Write-Host ("  Port: " + $Port)
          Write-Host ("  Auth: " + $(if ($AuthChoice -eq "1") { "Windows Authentication" } else { "SQL Authentication (user: $Username)" }))
          Write-Host ""

          # Save to environment variables for next task
          [System.Environment]::SetEnvironmentVariable("NR_CLI_MSSQL_HOSTNAME", $Hostname, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_MSSQL_PORT", $Port, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_DB_USERNAME", $Username, "Process")
          [System.Environment]::SetEnvironmentVariable("NR_CLI_DB_PASSWORD", $Password, "Process")

          # Also save to a temp file as backup
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          $configContent = "HOSTNAME=$Hostname`nPORT=$Port`nUSERNAME=$Username`nPASSWORD=$Password"
          [System.IO.File]::WriteAllText($configFile, $configContent, [System.Text.Encoding]::UTF8)
          '

    # ── Prompt user for New Relic region selection ────────────────────────────
    prompt_region_selection:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "=== New Relic Region Selection ==="
          Write-Host ""
          Write-Host "Select your New Relic region:"
          Write-Host "  1. US Production (otlp.nr-data.net)"
          Write-Host "  2. EU Production (otlp.eu01.nr-data.net)"
          Write-Host ""

          $RegionChoice = Read-Host "Enter choice (1 or 2, press Enter for 1)"
          if ([string]::IsNullOrWhiteSpace($RegionChoice)) { $RegionChoice = "1" }

          if ($RegionChoice -ne "1" -and $RegionChoice -ne "2") {
            Write-Host ""
            Write-Host "ERROR: Invalid choice `"$RegionChoice`". Enter 1 for US Production or 2 for EU Production."
            Write-Host ""
            exit 1
          }

          $Endpoint = ""
          $RegionName = ""

          if ($RegionChoice -eq "1") {
            $Endpoint = "https://otlp.nr-data.net"
            $RegionName = "US Production"
          } else {
            $Endpoint = "https://otlp.eu01.nr-data.net"
            $RegionName = "EU Production"
          }

          Write-Host ""
          Write-Host "Selected: $RegionName"
          Write-Host "Endpoint: $Endpoint"
          Write-Host ""

          # Save endpoint to a temp file for later use
          $endpointFile = Join-Path $env:TEMP "nr-mssql-endpoint.txt"
          $endpointContent = "ENDPOINT=$Endpoint`nREGION=$RegionName"
          [System.IO.File]::WriteAllText($endpointFile, $endpointContent, [System.Text.Encoding]::UTF8)

          Write-Host "Region configuration saved."
          Write-Host ""
          '

    # ── Prompt user for New Relic License Key or read from environment ────────
    prompt_license_key:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "=== New Relic License Key Configuration ==="
          Write-Host ""

          $LicenseKey = ""

          # Check if license key is provided via environment variables
          if ($env:LICENSE_KEY) {
            $LicenseKey = $env:LICENSE_KEY
            Write-Host "Using LICENSE_KEY from environment"
          } elseif ($env:NEW_RELIC_LICENSE_KEY) {
            $LicenseKey = $env:NEW_RELIC_LICENSE_KEY
            Write-Host "Using NEW_RELIC_LICENSE_KEY from environment"
          } else {
            # Prompt user for license key
            Write-Host "New Relic License Key not found in environment variables."
            Write-Host ""
            $SecureLicenseKey = Read-Host "Enter your New Relic License Key" -AsSecureString
            $BSTR = [System.Runtime.InteropServices.Marshal]::SecureStringToBSTR($SecureLicenseKey)
            $LicenseKey = [System.Runtime.InteropServices.Marshal]::PtrToStringAuto($BSTR)
            [System.Runtime.InteropServices.Marshal]::ZeroFreeBSTR($BSTR)
          }

          if ([string]::IsNullOrWhiteSpace($LicenseKey)) {
            Write-Host ""
            Write-Host "ERROR: License Key cannot be empty."
            Write-Host ""
            exit 1
          }

          Write-Host ""
          Write-Host "License Key configured successfully."
          Write-Host ""

          # Save license key to a temp file for later use
          $licenseKeyFile = Join-Path $env:TEMP "nr-mssql-license-key.txt"
          $licenseKeyContent = "LICENSE_KEY=$LicenseKey"
          [System.IO.File]::WriteAllText($licenseKeyFile, $licenseKeyContent, [System.Text.Encoding]::UTF8)

          Write-Host "License Key configuration saved."
          Write-Host ""
          '

    # ── Prompt user for monitored databases ────────────────────────────────────
    prompt_monitored_databases:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "=== Database Monitoring Configuration ==="
          Write-Host ""
          Write-Host "Specify which databases to monitor:"
          Write-Host "  - Enter database names separated by commas (e.g., adventuredb, myshop, sales)"
          Write-Host "  - Press Enter to monitor ALL databases (default)"
          Write-Host ""

          $DatabaseInput = Read-Host "Enter database names (or press Enter for all databases)"

          $MonitoredDatabases = "[]"
          $DatabaseMessage = "All databases will be monitored"

          if (-not [string]::IsNullOrWhiteSpace($DatabaseInput)) {
            # Split by comma, trim whitespace, and format as YAML array
            $dbList = $DatabaseInput -split "," | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
            if ($dbList.Count -gt 0) {
              $MonitoredDatabases = "[" + ($dbList -join ", ") + "]"
              $DatabaseMessage = "Monitoring specific databases: " + ($dbList -join ", ")
            }
          }

          Write-Host ""
          Write-Host $DatabaseMessage
          Write-Host ""

          # Save monitored databases to a temp file for later use
          $dbFile = Join-Path $env:TEMP "nr-mssql-monitored-databases.txt"
          $dbContent = "MONITORED_DATABASES=$MonitoredDatabases"
          [System.IO.File]::WriteAllText($dbFile, $dbContent, [System.Text.Encoding]::UTF8)

          Write-Host "Database monitoring configuration saved."
          Write-Host ""
          '

    # ── Check sqlcmd is installed ─────────────────────────────────────────────
    assert_sqlcmd:
      cmds:
        - |
          powershell -command '
          if (Get-Command sqlcmd -ErrorAction SilentlyContinue) {
            Write-Host ("sqlcmd found: " + (Get-Command sqlcmd).Source)
            exit 0
          }
          Write-Host ""
          Write-Host "ERROR: sqlcmd is not installed or not in PATH."
          Write-Host ""
          Write-Host "sqlcmd is required to create the SQL Server monitoring login."
          Write-Host "Install it using one of the following methods:"
          Write-Host ""
          Write-Host "  Option 1 - SQL Server Command Line Tools (recommended):"
          Write-Host "    https://learn.microsoft.com/en-us/sql/tools/sqlcmd/sqlcmd-utility"
          Write-Host ""
          Write-Host "  Option 2 - winget:"
          Write-Host "    winget install Microsoft.SQLServerCommandLineTools"
          Write-Host ""
          Write-Host "After installing, re-run this recipe."
          Write-Host ""
          exit 1
          '

    # ── Check SQL Server version (must be 2017 / v14 or later) ───────────────
    #
    # Tries Windows Authentication first (works for local or domain SQL Server).
    # If that fails, tries SQL Authentication using NR_CLI_DB_USERNAME/PASSWORD
    # if provided. If both fail, the version check is skipped with a notice.
    # ─────────────────────────────────────────────────────────────────────────
    assert_db_version:
      cmds:
        - |
          powershell -command '
          # Load config from temp file
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          if (Test-Path $configFile) {
            Get-Content $configFile -Encoding UTF8 | ForEach-Object {
              if ($_ -match "^(\w+)=(.*)$") {
                $varName = $matches[1]
                $varValue = $matches[2].Trim()
                Set-Variable -Name $varName -Value $varValue
                Write-Host ("Loaded: " + $varName + " = " + $varValue)
              }
            }
          } else {
            Write-Host "ERROR: Configuration file not found. Please re-run the installation."
            exit 1
          }

          $Server = $HOSTNAME + "," + $PORT
          $sq = [char]39
          $Query = "SET NOCOUNT ON; SELECT SERVERPROPERTY(" + $sq + "ProductMajorVersion" + $sq + ")"

          Write-Host ""
          Write-Host "Checking SQL Server version..."
          Write-Host ("  Server : " + $Server)

          # Run query using SQL Auth or Windows Auth depending on available credentials
          if ($USERNAME -and $PASSWORD) {
            Write-Host "  Using SQL Authentication..."
            $raw = sqlcmd -S $Server -U $USERNAME -P $PASSWORD -Q $Query -h -1 -W 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Failed to connect to SQL Server at $Server"
              Write-Host "  - Verify the server address and port are reachable"
              Write-Host "  - Verify the username and password are correct"
              Write-Host "  - Ensure SQL Server allows remote connections"
              Write-Host "  - Check that port $PORT is open in the firewall"
              Write-Host ""
              exit 1
            }
          } else {
            Write-Host "  Using Windows Authentication..."
            $raw = sqlcmd -S $Server -E -Q $Query -h -1 -W 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "ERROR: Windows Authentication failed for $Server"
              Write-Host "  - Ensure the current Windows user has access to SQL Server"
              Write-Host "  - Or re-run and choose SQL Authentication with valid credentials"
              Write-Host ""
              exit 1
            }
          }

          # Detect SQL-level errors even when sqlcmd exits 0
          if ($raw -match "Msg \d+, Level \d+") {
            Write-Host ""
            Write-Host "ERROR: SQL Server returned an error while checking version:"
            Write-Host ($raw.Trim())
            Write-Host ""
            exit 1
          }

          $majorVersionMatch = $raw -split "`n" | Where-Object { $_ -match "^\s*\d+\s*$" } | Select-Object -First 1
          $majorVersion = if ($majorVersionMatch) { $majorVersionMatch.Trim() } else { "" }

          if (-not $majorVersion -or -not ($majorVersion -match "^\d+$")) {
            Write-Host ""
            Write-Host "ERROR: Could not determine SQL Server version."
            Write-Host "  sqlcmd output: " + $raw.Trim()
            Write-Host ""
            exit 1
          }

          $major = [int]$majorVersion

          $versionMap = @{ 8="2000"; 9="2005"; 10="2008"; 11="2012"; 12="2014"; 13="2016"; 14="2017"; 15="2019"; 16="2022" }
          $friendlyVersion = if ($versionMap.ContainsKey($major)) { $versionMap[$major] } else { "Unknown" }

          Write-Host ("  Version: SQL Server " + $friendlyVersion + " (v" + $major + ")")

          if ($major -lt 14) {
            Write-Host ""
            Write-Host ("ERROR: SQL Server " + $friendlyVersion + " (v" + $major + ") is not supported.")
            Write-Host ""
            Write-Host "The New Relic MSSQL OTel integration requires SQL Server 2017 (v14) or later."
            Write-Host "Supported versions: 2017, 2019, 2022"
            Write-Host ""
            Write-Host "Please upgrade your SQL Server instance and re-run this recipe."
            Write-Host ""
            exit 1
          }

          Write-Host ("  Status : Supported (SQL Server " + $friendlyVersion + ")")
          Write-Host ""
          '

    # ── Create monitoring user with required permissions ──────────────────────
    create_monitoring_user:
      cmds:
        - |
          powershell -command '
          # Load config from temp file
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          if (Test-Path $configFile) {
            Get-Content $configFile -Encoding UTF8 | ForEach-Object {
              if ($_ -match "^(\w+)=(.*)$") {
                $varName = $matches[1]
                $varValue = $matches[2].Trim()
                Set-Variable -Name $varName -Value $varValue
              }
            }
          } else {
            Write-Host "ERROR: Configuration file not found. Please re-run the installation."
            exit 1
          }

          # Prompt for monitoring username
          Write-Host ""
          Write-Host "=== SQL Server Monitoring User Setup ==="
          Write-Host ""
          $MonitoringUsername = Read-Host "Enter monitoring username (press Enter for default: newrelic)"
          if ([string]::IsNullOrWhiteSpace($MonitoringUsername)) {
            $MonitoringUsername = "newrelic"
          }

          Write-Host ""
          Write-Host "Creating SQL Server monitoring user..."
          Write-Host "  Username: $MonitoringUsername"

          # Auto-generate a secure password that meets Windows complexity requirements
          # Must contain: uppercase, lowercase, number, and special character
          $upper = -join ((65..90) | Get-Random -Count 4 | ForEach-Object {[char]$_})
          $lower = -join ((97..122) | Get-Random -Count 4 | ForEach-Object {[char]$_})
          $numbers = -join ((48..57) | Get-Random -Count 4 | ForEach-Object {[char]$_})
          $special = -join ("!@#$%^&*".ToCharArray() | Get-Random -Count 2)
          $allChars = ($upper + $lower + $numbers + $special).ToCharArray()
          $MonitoringPassword = -join ($allChars | Get-Random -Count $allChars.Length)
          Write-Host "  Password: $MonitoringPassword (auto-generated)"

          $Server = $HOSTNAME + "," + $PORT
          Write-Host "  Server: $Server"
          Write-Host "  Username: $MonitoringUsername"

          # Create SQL script for user creation and permissions
          $SQL=@"
          SET QUOTED_IDENTIFIER OFF;
          USE [master];

          -- Create login if it does not already exist; update password if it does
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = `"$MonitoringUsername`")
          BEGIN
              CREATE LOGIN [$MonitoringUsername] WITH PASSWORD = `"$MonitoringPassword`"
          END
          ELSE
          BEGIN
              ALTER LOGIN [$MonitoringUsername] WITH PASSWORD = `"$MonitoringPassword`"
          END

          -- Instance-level permissions
          GRANT VIEW SERVER STATE   TO [$MonitoringUsername]
          GRANT VIEW ANY DEFINITION TO [$MonitoringUsername]
          GRANT VIEW ANY DATABASE   TO [$MonitoringUsername]

          -- Grant read access privileges to all online non-system user databases
          DECLARE @name SYSNAME
          DECLARE db_cursor CURSOR READ_ONLY FORWARD_ONLY FOR
              SELECT NAME FROM master.sys.databases WHERE NAME NOT IN (`"master`", `"msdb`", `"tempdb`", `"model`", `"rdsadmin`", `"distribution`") and state = 0
          OPEN db_cursor
          FETCH NEXT FROM db_cursor INTO @name WHILE @@FETCH_STATUS = 0
          BEGIN
              BEGIN TRY
                  EXECUTE(`"USE [`" + @name + `"]; IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = `"`"$MonitoringUsername`"`") BEGIN CREATE USER [$MonitoringUsername] FOR LOGIN [$MonitoringUsername]; END; GRANT VIEW DATABASE STATE TO [$MonitoringUsername]; GRANT VIEW DEFINITION TO [$MonitoringUsername]; ALTER ROLE db_datareader ADD MEMBER [$MonitoringUsername];`")
              END TRY
              BEGIN CATCH
              END CATCH
              FETCH next FROM db_cursor INTO @name
          END
          CLOSE db_cursor
          DEALLOCATE db_cursor

          select name from sys.syslogins where name = `"$MonitoringUsername`"
          "@

          # Write SQL to temp file
          $SqlFile = Join-Path $env:TEMP "nr-create-monitoring-user.sql"
          if (Test-Path $SqlFile) { Remove-Item $SqlFile }
          [System.IO.File]::WriteAllText($SqlFile, $SQL, [System.Text.Encoding]::UTF8)

          # Execute SQL using appropriate authentication method
          Write-Host ""
          Write-Host "Executing SQL to create monitoring user..."

          if ($USERNAME -and $PASSWORD) {
            Write-Host "  Using SQL Authentication..."
            $SqlOutput = sqlcmd -S $Server -U $USERNAME -P $PASSWORD -i $SqlFile -W 2>&1 | Out-String
          } else {
            Write-Host "  Using Windows Authentication..."
            $SqlOutput = sqlcmd -S $Server -E -i $SqlFile -W 2>&1 | Out-String
          }

          $SqlExitCode = $LASTEXITCODE

          # Clean up temp file
          if (Test-Path $SqlFile) { Remove-Item $SqlFile }

          # Check for SQL errors
          if ($SqlExitCode -ne 0 -or $SqlOutput -match "Msg \d+, Level \d+") {
            Write-Host ""
            Write-Host "ERROR: Failed to create monitoring user!"
            Write-Host "  SQL Server returned exit code: $SqlExitCode"
            Write-Host ""
            Write-Host "Error details:"
            Write-Host $SqlOutput
            Write-Host ""
            exit 1
          }

          # Verify user was created by checking the output for the username
          Write-Host ""
          Write-Host "Verifying monitoring user creation..."

          $verifyQuery = "SET QUOTED_IDENTIFIER OFF; SET NOCOUNT ON; SELECT name FROM sys.syslogins WHERE name = `"$MonitoringUsername`""
          $verifyFile = Join-Path $env:TEMP "nr-verify-user.sql"
          [System.IO.File]::WriteAllText($verifyFile, $verifyQuery, [System.Text.Encoding]::UTF8)

          if ($USERNAME -and $PASSWORD) {
            $verifyOutput = sqlcmd -S $Server -U $USERNAME -P $PASSWORD -i $verifyFile -h -1 -W 2>&1 | Out-String
          } else {
            $verifyOutput = sqlcmd -S $Server -E -i $verifyFile -h -1 -W 2>&1 | Out-String
          }

          if (Test-Path $verifyFile) { Remove-Item $verifyFile }

          # Check if verification was successful
          $userCreated = $false
          if ($verifyOutput.Trim() -match $MonitoringUsername) {
            $userCreated = $true
          }

          if ($userCreated) {
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "SUCCESS: Monitoring user created!"
            Write-Host "=========================================="
            Write-Host ""
            Write-Host "Credentials for SQL Server monitoring:"
            Write-Host "  Username: $MonitoringUsername"
            Write-Host "  Password: $MonitoringPassword"
            Write-Host ""
            Write-Host "IMPORTANT: Save these credentials securely!"
            Write-Host "You will need them to configure the NRDOT Collector."
            Write-Host ""

            # Save monitoring user credentials to config file for later use
            $monitoringConfigFile = Join-Path $env:TEMP "nr-mssql-monitoring-user.txt"
            $monitoringContent = "MONITORING_USERNAME=$MonitoringUsername`nMONITORING_PASSWORD=$MonitoringPassword"
            [System.IO.File]::WriteAllText($monitoringConfigFile, $monitoringContent, [System.Text.Encoding]::UTF8)
          } else {
            Write-Host ""
            Write-Host "ERROR: Monitoring user was not created successfully!"
            Write-Host "Verification query output:"
            Write-Host $verifyOutput
            Write-Host ""
            Write-Host "Please check:"
            Write-Host "  - SQL Server logs for detailed error messages"
            Write-Host "  - That the admin user has sufficient permissions"
            Write-Host "  - That SQL Server is configured for SQL Authentication"
            Write-Host ""
            exit 1
          }
          '

    # ── Download and install NRDOT Collector MSI ──────────────────────────────
    install_nrdot:
      cmds:
        - |
          powershell -command '
          $MsiUrl  = "https://download.newrelic.com/database-monitoring/nrdot-collector/nrdot-collector-host-windows-amd64-latest.msi"
          $MsiFile = [System.IO.Path]::Combine($env:TEMP, "nrdot-collector-host-windows-amd64-latest.msi")
          $LogFile = [System.IO.Path]::Combine($env:TEMP, "nrdot-install.log")

          Write-Host ""
          Write-Host "Downloading NRDOT Collector..."
          Write-Host ("  URL : " + $MsiUrl)
          Write-Host ""

          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest -Uri $MsiUrl -OutFile $MsiFile -UseBasicParsing -ErrorAction Stop
          $ProgressPreference = "Continue"

          if (-not (Test-Path $MsiFile)) {
            Write-Error "Download failed - MSI file not found"
            exit 1
          }
          Write-Host "Download complete."
          Write-Host ""

          Write-Host "Installing NRDOT Collector (this may take a moment)..."
          $process = Start-Process -FilePath "msiexec.exe" -ArgumentList ("/qn /i " + [char]34 + $MsiFile + [char]34 + " /l*v " + [char]34 + $LogFile + [char]34) -Wait -PassThru

          if (Test-Path $MsiFile) { Remove-Item $MsiFile -Force }

          if ($process.ExitCode -ne 0) {
            Write-Error ("MSI installation failed (exit code " + $process.ExitCode + "). Review log: " + $LogFile)
            exit 1
          }

          Write-Host "NRDOT Collector installed successfully."
          Write-Host ""

          # Wait for service to be registered
          Write-Host "Waiting for service to be registered..."
          Start-Sleep -Seconds 2

          # Check if service is running, start it if not
          Write-Host "Checking NRDOT Collector service status..."
          $service = Get-Service -Name "NRDOT Collector Host" -ErrorAction SilentlyContinue

          if ($service) {
            Write-Host ("Service status: " + $service.Status)

            if ($service.Status -ne "Running") {
              Write-Host "Starting NRDOT Collector service..."
              Start-Service -Name "NRDOT Collector Host"
              Start-Sleep -Seconds 2

              $service = Get-Service -Name "NRDOT Collector Host"
              Write-Host ("Service status after start: " + $service.Status)
            } else {
              Write-Host "Service is already running."
            }
          } else {
            Write-Host "WARNING: NRDOT Collector Host service not found."
          }

          Write-Host ""
          '

    # ── Configure NRDOT Collector with SQL Server monitoring ──────────────────
    configure_nrdot:
      cmds:
        - |
          powershell -command '
          # Load connection config
          $configFile = Join-Path $env:TEMP "nr-mssql-config.txt"
          if (-not (Test-Path $configFile)) {
            Write-Host "ERROR: Connection configuration file not found."
            exit 1
          }

          $config = @{}
          Get-Content $configFile -Encoding UTF8 | ForEach-Object {
            if ($_ -match "^(\w+)=(.*)$") {
              $config[$matches[1]] = $matches[2].Trim()
            }
          }

          # Load monitoring user credentials
          $monitoringConfigFile = Join-Path $env:TEMP "nr-mssql-monitoring-user.txt"
          if (-not (Test-Path $monitoringConfigFile)) {
            Write-Host "ERROR: Monitoring user configuration file not found."
            exit 1
          }

          Get-Content $monitoringConfigFile -Encoding UTF8 | ForEach-Object {
            if ($_ -match "^MONITORING_(\w+)=(.*)$") {
              $config["MONITORING_" + $matches[1]] = $matches[2].Trim()
            }
          }

          # Load monitored databases configuration
          $dbConfigFile = Join-Path $env:TEMP "nr-mssql-monitored-databases.txt"
          if (-not (Test-Path $dbConfigFile)) {
            Write-Host "ERROR: Monitored databases configuration file not found."
            exit 1
          }

          Get-Content $dbConfigFile -Encoding UTF8 | ForEach-Object {
            if ($_ -match "^(\w+)=(.*)$") {
              $config[$matches[1]] = $matches[2].Trim()
            }
          }

          Write-Host ""
          Write-Host "=== Configuring NRDOT Collector ==="
          Write-Host ""
          Write-Host "Configuration details:"
          Write-Host ("  SQL Server: " + $config["HOSTNAME"] + ":" + $config["PORT"])
          Write-Host ("  Monitoring User: " + $config["MONITORING_USERNAME"])
          Write-Host ("  Monitored Databases: " + $config["MONITORED_DATABASES"])
          Write-Host ""

          $configPath = "C:\Program Files (x86)\NRDOT Collector Host\config.yaml"

          # Backup existing config
          if (Test-Path $configPath) {
            $backupPath = $configPath + ".backup." + (Get-Date -Format "yyyyMMdd-HHmmss")
            Write-Host "Backing up existing config to:" $backupPath
            Copy-Item $configPath $backupPath
          }

          # Extract values
          $hostname = $config["HOSTNAME"]
          $port = $config["PORT"]
          $username = $config["MONITORING_USERNAME"]
          $password = $config["MONITORING_PASSWORD"]
          $monitoredDatabases = $config["MONITORED_DATABASES"]

          Write-Host "Reading existing configuration..."
          $existingConfig = Get-Content $configPath -Raw -Encoding UTF8

          # Build the newrelicsqlserver receiver configuration using string concatenation
          $nl = "`r`n"
          $sqlServerReceiver = $nl + "  newrelicsqlserver:" + $nl
          $sqlServerReceiver += "    hostname: `"" + $hostname + "`"" + $nl
          $sqlServerReceiver += "    port: `"" + $port + "`"" + $nl
          $sqlServerReceiver += "    username: `"" + $username + "`"" + $nl
          $sqlServerReceiver += "    password: `"" + $password + "`"" + $nl
          $sqlServerReceiver += "    monitored_databases: " + $monitoredDatabases + $nl
          $sqlServerReceiver += "    # timeout: 30s" + $nl
          $sqlServerReceiver += "    # collection_interval: 30s" + $nl
          $sqlServerReceiver += "    # query_monitoring_fetch_interval: 15" + $nl
          $sqlServerReceiver += "    # query_monitoring_response_time_threshold: 100" + $nl
          $sqlServerReceiver += "    # query_monitoring_count_threshold: 30" + $nl
          $sqlServerReceiver += "    # interval_calculator_cache_ttl_minutes: 10" + $nl
          $sqlServerReceiver += $nl
          $sqlServerReceiver += "    # Core Metric Category Toggles - Enable/disable entire categories of metrics" + $nl
          $sqlServerReceiver += "    # enable_instance_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_database_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_user_connection_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_wait_time_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_failover_cluster_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_database_principals_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_database_role_membership_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_security_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_lock_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_thread_pool_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_tempdb_metrics: true" + $nl
          $sqlServerReceiver += "    # enable_database_buffer_metrics: true" + $nl

          # Check if newrelicsqlserver receiver already exists
          $newConfig = $existingConfig
          if ($existingConfig -match "newrelicsqlserver:") {
            Write-Host "SQL Server receiver already exists in configuration, skipping..."
          } else {
            Write-Host "Adding SQL Server receiver to configuration..."
            # Find the processors section and insert the SQL Server receiver before it
            $processorsIndex = $existingConfig.IndexOf("processors:")
            if ($processorsIndex -gt 0) {
              $beforeProcessors = $existingConfig.Substring(0, $processorsIndex)
              $afterProcessors = $existingConfig.Substring($processorsIndex)
              $newConfig = $beforeProcessors + $sqlServerReceiver + "`r`n" + $afterProcessors
            } else {
              Write-Host "ERROR: Could not find processors section in config file"
              exit 1
            }
          }

          # Check if transform/clear_metadata processor already exists
          if ($newConfig -match "transform/clear_metadata:") {
            Write-Host "transform/clear_metadata processor already exists, skipping..."
          } else {
            Write-Host "Adding transform/clear_metadata processor..."
            # Build the transform/clear_metadata processor configuration
            $transformProcessor = $nl + "  # Transform to clear description and unit fields" + $nl
            $transformProcessor += "  transform/clear_metadata:" + $nl
            $transformProcessor += "    metric_statements:" + $nl
            $transformProcessor += "      - context: metric" + $nl
            $transformProcessor += "        statements:" + $nl
            $transformProcessor += "          - set(metric.description, `"`")" + $nl
            $transformProcessor += "          - set(metric.unit, `"`")" + $nl
            $transformProcessor += $nl

            # Try to insert before cumulativetodelta processor (more reliable insertion point)
            if ($newConfig -match "cumulativetodelta:") {
              Write-Host "Inserting transform/clear_metadata before cumulativetodelta processor..."
              $newConfig = $newConfig -replace "(\s+cumulativetodelta:)", ($transformProcessor + "`$1")
            } else {
              # Fallback: insert after processors: line
              Write-Host "Inserting transform/clear_metadata after processors: line..."
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $transformProcessor)
            }
          }

          # Check if filter/exec_plan_include processor already exists
          if ($newConfig -match "filter/exec_plan_include:") {
            Write-Host "filter/exec_plan_include processor already exists, skipping..."
          } else {
            Write-Host "Adding filter/exec_plan_include processor..."
            # Build the filter/exec_plan_include processor configuration
            $execPlanFilter = "  # Filter to only include execution plan and event metrics (for logs conversion)" + $nl
            $execPlanFilter += "  filter/exec_plan_include:" + $nl
            $execPlanFilter += "    metrics:" + $nl
            $execPlanFilter += "      include:" + $nl
            $execPlanFilter += "        match_type: strict" + $nl
            $execPlanFilter += "        metric_names:" + $nl
            $execPlanFilter += "          - sqlserver.slowquery.query_details" + $nl
            $execPlanFilter += "          - sqlserver.execution.plan" + $nl
            $execPlanFilter += "          - sqlserver.blocking_query.details" + $nl
            $execPlanFilter += "          - sqlserver.activequery.query_details" + $nl
            $execPlanFilter += $nl

            # Insert right after transform/clear_metadata if it exists, otherwise before cumulativetodelta
            if ($newConfig -match "transform/clear_metadata:[\s\S]*?(\r\n\r\n|\n\n)") {
              Write-Host "Inserting filter/exec_plan_include after transform/clear_metadata processor..."
              $newConfig = $newConfig -replace "(transform/clear_metadata:[\s\S]*?set\(metric\.unit, `"`"\)\r\n)", ("`$1" + $nl + $execPlanFilter)
            } elseif ($newConfig -match "cumulativetodelta:") {
              Write-Host "Inserting filter/exec_plan_include before cumulativetodelta processor..."
              $newConfig = $newConfig -replace "(\s+cumulativetodelta:)", ($execPlanFilter + "`$1")
            } else {
              # Fallback: insert after processors: line
              Write-Host "Inserting filter/exec_plan_include after processors: line..."
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $execPlanFilter)
            }
          }

          # Check if filter/exec_plan_exclude processor already exists
          if ($newConfig -match "filter/exec_plan_exclude:") {
            Write-Host "filter/exec_plan_exclude processor already exists, skipping..."
          } else {
            Write-Host "Adding filter/exec_plan_exclude processor..."
            # Build the filter/exec_plan_exclude processor configuration
            $execPlanExcludeFilter = "  # Filter to exclude execution plan and event metrics (from main metrics pipeline)" + $nl
            $execPlanExcludeFilter += "  filter/exec_plan_exclude:" + $nl
            $execPlanExcludeFilter += "    metrics:" + $nl
            $execPlanExcludeFilter += "      exclude:" + $nl
            $execPlanExcludeFilter += "        match_type: strict" + $nl
            $execPlanExcludeFilter += "        metric_names:" + $nl
            $execPlanExcludeFilter += "          - sqlserver.slowquery.query_details" + $nl
            $execPlanExcludeFilter += "          - sqlserver.execution.plan" + $nl
            $execPlanExcludeFilter += "          - sqlserver.blocking_query.details" + $nl
            $execPlanExcludeFilter += "          - sqlserver.activequery.query_details" + $nl
            $execPlanExcludeFilter += $nl

            # Insert right after filter/exec_plan_include if it exists, otherwise before cumulativetodelta
            if ($newConfig -match "filter/exec_plan_include:[\s\S]*?activequery\.query_details\r\n") {
              Write-Host "Inserting filter/exec_plan_exclude after filter/exec_plan_include processor..."
              $newConfig = $newConfig -replace "(filter/exec_plan_include:[\s\S]*?activequery\.query_details\r\n)", ("`$1" + $nl + $execPlanExcludeFilter)
            } elseif ($newConfig -match "cumulativetodelta:") {
              Write-Host "Inserting filter/exec_plan_exclude before cumulativetodelta processor..."
              $newConfig = $newConfig -replace "(\s+cumulativetodelta:)", ($execPlanExcludeFilter + "`$1")
            } else {
              # Fallback: insert after processors: line
              Write-Host "Inserting filter/exec_plan_exclude after processors: line..."
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $execPlanExcludeFilter)
            }
          }

          # Check if cumulativetodelta processor exists and update/add SQL Server metrics
          if ($newConfig -match "cumulativetodelta:" -and $newConfig -match "sqlserver\.wait_stats\.latch\.wait_time_ms") {
            Write-Host "cumulativetodelta processor already has SQL Server metrics, skipping..."
          } elseif ($newConfig -match "cumulativetodelta:") {
            Write-Host "Updating cumulativetodelta processor with SQL Server metrics..."
            # Replace the existing cumulativetodelta with the full configuration
            $cumulativeToDelta = $nl + "  cumulativetodelta:" + $nl
            $cumulativeToDelta += "    max_staleness: 5m" + $nl
            $cumulativeToDelta += "    include:" + $nl
            $cumulativeToDelta += "      match_type: strict" + $nl
            $cumulativeToDelta += "      metrics:" + $nl
            $cumulativeToDelta += "        # Wait stats (sys.dm_os_wait_stats)" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.latch.wait_time_ms" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.latch.waiting_tasks_count" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.wait_time_ms" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.waiting_tasks_count" + $nl
            $cumulativeToDelta += "        # Instance stats (sys.dm_os_performance_counters)" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.sql_compilations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.sql_recompilations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.lock_waits_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.deadlocks_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.user_errors_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.kill_connection_errors_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.access.page_splits_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.buffer.checkpoint_pages_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.bufferpool.batch_requests_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.transactions_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.forced_parameterizations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.full_scans_rate" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.lock_timeouts_rate" + $nl
            $cumulativeToDelta += "        # Database log (sys.dm_os_performance_counters)" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.flushes_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.bytes_flushed_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.flush_waits_per_sec" + $nl
            $cumulativeToDelta += "        # Failover cluster" + $nl
            $cumulativeToDelta += "        - sqlserver.failover_cluster.log_bytes_received_per_sec" + $nl
            $cumulativeToDelta += "        # User connections" + $nl
            $cumulativeToDelta += "        - sqlserver.user_connections.authentication.logins_per_sec" + $nl
            # Replace existing cumulativetodelta section (handle simple definition)
            $newConfig = $newConfig -replace "(\s+cumulativetodelta:[\r\n]+)", $cumulativeToDelta
          } else {
            Write-Host "Adding cumulativetodelta processor with SQL Server metrics..."
            # Build the complete cumulativetodelta processor configuration
            $cumulativeToDelta = $nl + "  cumulativetodelta:" + $nl
            $cumulativeToDelta += "    max_staleness: 5m" + $nl
            $cumulativeToDelta += "    include:" + $nl
            $cumulativeToDelta += "      match_type: strict" + $nl
            $cumulativeToDelta += "      metrics:" + $nl
            $cumulativeToDelta += "        # Wait stats (sys.dm_os_wait_stats)" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.latch.wait_time_ms" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.latch.waiting_tasks_count" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.wait_time_ms" + $nl
            $cumulativeToDelta += "        - sqlserver.wait_stats.waiting_tasks_count" + $nl
            $cumulativeToDelta += "        # Instance stats (sys.dm_os_performance_counters)" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.sql_compilations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.sql_recompilations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.lock_waits_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.deadlocks_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.user_errors_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.stats.kill_connection_errors_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.access.page_splits_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.buffer.checkpoint_pages_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.bufferpool.batch_requests_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.transactions_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.forced_parameterizations_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.full_scans_rate" + $nl
            $cumulativeToDelta += "        - sqlserver.instance.lock_timeouts_rate" + $nl
            $cumulativeToDelta += "        # Database log (sys.dm_os_performance_counters)" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.flushes_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.bytes_flushed_per_sec" + $nl
            $cumulativeToDelta += "        - sqlserver.database.log.flush_waits_per_sec" + $nl
            $cumulativeToDelta += "        # Failover cluster" + $nl
            $cumulativeToDelta += "        - sqlserver.failover_cluster.log_bytes_received_per_sec" + $nl
            $cumulativeToDelta += "        # User connections" + $nl
            $cumulativeToDelta += "        - sqlserver.user_connections.authentication.logins_per_sec" + $nl
            $cumulativeToDelta += $nl
            # Insert before deltatorate if it exists, otherwise before batch
            if ($newConfig -match "deltatorate:") {
              $newConfig = $newConfig -replace "(\s+deltatorate:)", ($cumulativeToDelta + "`$1")
            } elseif ($newConfig -match "batch:") {
              $newConfig = $newConfig -replace "(\s+batch:)", ($cumulativeToDelta + "`$1")
            } else {
              # Fallback: insert after processors: line
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $cumulativeToDelta)
            }
          }

          # Check if deltatorate processor exists and update/add SQL Server metrics
          if ($newConfig -match "deltatorate:" -and $newConfig -match "sqlserver\.wait_stats\.latch\.wait_time_ms") {
            Write-Host "deltatorate processor already has SQL Server metrics, skipping..."
          } elseif ($newConfig -match "deltatorate:") {
            Write-Host "Updating deltatorate processor with SQL Server metrics..."
            # Replace the existing deltatorate with the full configuration
            $deltaToRate = $nl + "  deltatorate:" + $nl
            $deltaToRate += "    metrics:" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.latch.wait_time_ms" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.latch.waiting_tasks_count" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.wait_time_ms" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.waiting_tasks_count" + $nl
            $deltaToRate += "      - sqlserver.stats.sql_compilations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.sql_recompilations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.lock_waits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.deadlocks_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.user_errors_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.kill_connection_errors_per_sec" + $nl
            $deltaToRate += "      - sqlserver.access.page_splits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.buffer.checkpoint_pages_per_sec" + $nl
            $deltaToRate += "      - sqlserver.bufferpool.batch_requests_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.transactions_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.forced_parameterizations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.full_scans_rate" + $nl
            $deltaToRate += "      - sqlserver.instance.lock_timeouts_rate" + $nl
            $deltaToRate += "      - sqlserver.database.log.flushes_per_sec" + $nl
            $deltaToRate += "      - sqlserver.database.log.bytes_flushed_per_sec" + $nl
            $deltaToRate += "      - sqlserver.database.log.flush_waits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.failover_cluster.log_bytes_received_per_sec" + $nl
            $deltaToRate += "      - sqlserver.user_connections.authentication.logins_per_sec" + $nl
            # Replace existing deltatorate section (handle simple definition)
            $newConfig = $newConfig -replace "(\s+deltatorate:[\r\n]+)", $deltaToRate
          } else {
            Write-Host "Adding deltatorate processor with SQL Server metrics..."
            # Build the complete deltatorate processor configuration
            $deltaToRate = $nl + "  deltatorate:" + $nl
            $deltaToRate += "    metrics:" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.latch.wait_time_ms" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.latch.waiting_tasks_count" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.wait_time_ms" + $nl
            $deltaToRate += "      - sqlserver.wait_stats.waiting_tasks_count" + $nl
            $deltaToRate += "      - sqlserver.stats.sql_compilations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.sql_recompilations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.lock_waits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.deadlocks_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.user_errors_per_sec" + $nl
            $deltaToRate += "      - sqlserver.stats.kill_connection_errors_per_sec" + $nl
            $deltaToRate += "      - sqlserver.access.page_splits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.buffer.checkpoint_pages_per_sec" + $nl
            $deltaToRate += "      - sqlserver.bufferpool.batch_requests_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.transactions_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.forced_parameterizations_per_sec" + $nl
            $deltaToRate += "      - sqlserver.instance.full_scans_rate" + $nl
            $deltaToRate += "      - sqlserver.instance.lock_timeouts_rate" + $nl
            $deltaToRate += "      - sqlserver.database.log.flushes_per_sec" + $nl
            $deltaToRate += "      - sqlserver.database.log.bytes_flushed_per_sec" + $nl
            $deltaToRate += "      - sqlserver.database.log.flush_waits_per_sec" + $nl
            $deltaToRate += "      - sqlserver.failover_cluster.log_bytes_received_per_sec" + $nl
            $deltaToRate += "      - sqlserver.user_connections.authentication.logins_per_sec" + $nl
            $deltaToRate += $nl
            # Insert right after cumulativetodelta if it exists, otherwise before transform/host or batch
            if ($newConfig -match "cumulativetodelta:[\s\S]*?logins_per_sec\r\n") {
              Write-Host "Inserting deltatorate after cumulativetodelta processor..."
              $newConfig = $newConfig -replace "(cumulativetodelta:[\s\S]*?logins_per_sec\r\n)", ("`$1" + $deltaToRate)
            } elseif ($newConfig -match "transform/host:") {
              Write-Host "Inserting deltatorate before transform/host processor..."
              $newConfig = $newConfig -replace "(\s+transform/host:)", ($deltaToRate + "`$1")
            } elseif ($newConfig -match "batch:") {
              Write-Host "Inserting deltatorate before batch processor..."
              $newConfig = $newConfig -replace "(\s+batch:)", ($deltaToRate + "`$1")
            } else {
              # Fallback: insert after processors: line
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $deltaToRate)
            }
          }

          # Check if resourcedetection/db_safe processor already exists
          if ($newConfig -match "resourcedetection/db_safe:") {
            Write-Host "resourcedetection/db_safe processor already exists, skipping..."
          } else {
            Write-Host "Adding resourcedetection/db_safe processor..."
            # Build the resourcedetection/db_safe processor configuration
            $resourceDetectionDbSafe = $nl + "  resourcedetection/db_safe:" + $nl
            $resourceDetectionDbSafe += "    detectors: [`"system`"]" + $nl
            $resourceDetectionDbSafe += "    override: false" + $nl
            $resourceDetectionDbSafe += "    system:" + $nl
            $resourceDetectionDbSafe += "      hostname_sources: [`"os`"]" + $nl
            $resourceDetectionDbSafe += "      resource_attributes:" + $nl
            $resourceDetectionDbSafe += "        host.id:" + $nl
            $resourceDetectionDbSafe += "          enabled: true" + $nl
            $resourceDetectionDbSafe += $nl

            # Insert right after deltatorate if it exists, otherwise before batch
            if ($newConfig -match "deltatorate:[\s\S]*?logins_per_sec\r\n") {
              Write-Host "Inserting resourcedetection/db_safe after deltatorate processor..."
              $newConfig = $newConfig -replace "(deltatorate:[\s\S]*?logins_per_sec\r\n)", ("`$1" + $resourceDetectionDbSafe)
            } elseif ($newConfig -match "batch:") {
              Write-Host "Inserting resourcedetection/db_safe before batch processor..."
              $newConfig = $newConfig -replace "(\s+batch:)", ($resourceDetectionDbSafe + "`$1")
            } else {
              # Fallback: insert after processors: line
              $newConfig = $newConfig -replace "(processors:[\r\n]+)", ("`$1" + $resourceDetectionDbSafe)
            }
          }

          # Update the metrics pipeline to include newrelicsqlserver receiver (if not already present)
          if ($newConfig -match "pipelines:[\s\S]*?metrics:[\s\S]*?receivers: \[otlp\]" -and $newConfig -notmatch "pipelines:[\s\S]*?metrics:[\s\S]*?receivers: \[newrelicsqlserver") {
            Write-Host "Updating metrics pipeline to include newrelicsqlserver receiver..."
            # Be specific to the metrics: pipeline (not metrics/host)
            $newConfig = $newConfig -replace "(pipelines:[\s\S]*?)(metrics:[\s\S]*?receivers: )\[otlp\]", "`$1`$2[newrelicsqlserver, otlp]"
          } else {
            Write-Host "Metrics pipeline already includes newrelicsqlserver receiver, skipping..."
          }

          # Add transform/clear_metadata to the metrics pipeline processors (if not already present)
          if ($newConfig -match "transform/clear_metadata:" -and $newConfig -notmatch "metrics:[\s\S]*?processors:[\s\S]*?transform/clear_metadata") {
            Write-Host "Adding transform/clear_metadata to metrics pipeline processors..."
            # Add after memory_limiter in the metrics pipeline
            $newConfig = $newConfig -replace "(metrics:[\s\S]*?processors:[\s\S]*?memory_limiter,)", "`$1`r`n          transform/clear_metadata,"
          }

          # Add filter/exec_plan_exclude to the metrics pipeline processors (if not already present)
          if ($newConfig -match "filter/exec_plan_exclude:" -and $newConfig -notmatch "pipelines:[\s\S]*?metrics:[\s\S]*?filter/exec_plan_exclude") {
            Write-Host "Adding filter/exec_plan_exclude to metrics pipeline processors..."
            # Add before batch in the metrics pipeline (single-line format)
            $newConfig = $newConfig -replace "(pipelines:[\s\S]*?metrics:[\s\S]*?processors: \[[^\]]*)(batch\])", "`$1filter/exec_plan_exclude, `$2"
          }

          # Add metricsaslogs connector if not present
          if ($newConfig -match "metricsaslogs:") {
            Write-Host "metricsaslogs connector already exists, skipping..."
          } elseif ($newConfig -match "(?m)^connectors:") {
            Write-Host "Adding metricsaslogs to existing connectors section..."
            # Add metricsaslogs to existing connectors section
            $metricsAsLogs = "  metricsaslogs:" + $nl
            $metricsAsLogs += "    include_resource_attributes: true" + $nl
            $metricsAsLogs += "    include_scope_info: true" + $nl
            $metricsAsLogs += $nl
            # Insert after connectors: line (only the top-level one)
            $newConfig = $newConfig -replace "(?m)^(connectors:[\r\n]+)", ("`$1" + $metricsAsLogs)
          } else {
            Write-Host "Adding connectors section with metricsaslogs..."
            $connectorsSection = $nl + "connectors:" + $nl
            $connectorsSection += "  metricsaslogs:" + $nl
            $connectorsSection += "    include_resource_attributes: true" + $nl
            $connectorsSection += "    include_scope_info: true" + $nl
            $connectorsSection += $nl
            # Insert before top-level exporters section (at start of line, not inside pipelines)
            $newConfig = $newConfig -replace "(?m)^(exporters:)", ($connectorsSection + "`$1")
          }

          # Add metrics/exec_plan_to_logs pipeline if not present
          if ($newConfig -match "filter/exec_plan_include:" -and $newConfig -notmatch "metrics/exec_plan_to_logs:") {
            Write-Host "Adding metrics/exec_plan_to_logs pipeline..."
            $execPlanPipeline = $nl + "    metrics/exec_plan_to_logs:" + $nl
            $execPlanPipeline += "      receivers: [newrelicsqlserver, otlp]" + $nl
            $execPlanPipeline += "      processors: [memory_limiter, transform, resourcedetection, resourcedetection/cloud, resourcedetection/env, filter/exec_plan_include, batch]" + $nl
            $execPlanPipeline += "      exporters: [metricsaslogs]" + $nl
            # Insert before extensions section (at end of pipelines)
            $newConfig = $newConfig -replace "(\s+extensions:)", ($execPlanPipeline + "`$1")
          }

          # Remove metricsaslogs from traces pipeline if present (it should only be in logs)
          Write-Host "Checking traces pipeline for metricsaslogs..."
          $tracesBeforeCleanup = $newConfig
          # Use simple string replacement - more reliable than complex regex
          $newConfig = $newConfig -replace "traces:([\s\S]*?)receivers:\s*\[metricsaslogs,\s*otlp\]", "traces:`$1receivers: [otlp]"
          $newConfig = $newConfig -replace "traces:([\s\S]*?)receivers:\s*\[metricsaslogs\s*,\s*otlp\]", "traces:`$1receivers: [otlp]"

          if ($tracesBeforeCleanup -ne $newConfig) {
            Write-Host "Removed metricsaslogs from traces pipeline"
          }

          if ($newConfig -match "traces:[\s\S]*?receivers:\s*\[otlp\]") {
            Write-Host "Traces pipeline verified - only has [otlp] receivers"
          } elseif ($newConfig -match "traces:[\s\S]*?receivers:\s*\[metricsaslogs") {
            Write-Host "WARNING: Failed to remove metricsaslogs from traces pipeline"
          }

          # Update logs pipeline to include metricsaslogs receiver if not present
          if ($newConfig -match "metricsaslogs:" -and $newConfig -match "logs:[\s\S]*?receivers: \[otlp\]" -and $newConfig -notmatch "logs:[\s\S]*?receivers: \[metricsaslogs") {
            Write-Host "Adding metricsaslogs to logs pipeline receivers..."
            $newConfig = $newConfig -replace "(logs:[\s\S]*?receivers: )\[otlp\]", "`$1[metricsaslogs, otlp]"
          }

          # Ensure otlphttp exporter has compression: gzip
          if ($newConfig -notmatch "compression:\s*gzip") {
            Write-Host "Adding compression: gzip to otlphttp exporter..."
            # Simple approach: find the line after api-key and insert compression
            # Match the api-key line and add compression on the next line at same indentation as headers/endpoint
            $newConfig = $newConfig -replace "(exporters:\r\n\s+otlphttp:\r\n\s+endpoint:[^\r\n]+\r\n\s+headers:\r\n\s+api-key:[^\r\n]+\r\n)", "`$1    compression: gzip`r`n"
            Write-Host "Added compression: gzip"
          } else {
            Write-Host "compression: gzip already exists"
          }

          # Add resourcedetection/db_safe to metrics/host pipeline processors (if not already present)
          if ($newConfig -match "resourcedetection/db_safe:" -and $newConfig -match "metrics/host:[\s\S]*?processors:" -and $newConfig -notmatch "metrics/host:[\s\S]*?resourcedetection/db_safe") {
            Write-Host "Adding resourcedetection/db_safe to metrics/host pipeline processors..."
            # Add after resourcedetection/env in the metrics/host pipeline
            $newConfig = $newConfig -replace "(metrics/host:[\s\S]*?processors:[\s\S]*?resourcedetection/env[\r\n]+)", ("`$1        - resourcedetection/db_safe`r`n")
          }

          # Add deltatorate to metrics/host pipeline processors (if not already present)
          if ($newConfig -match "deltatorate:" -and $newConfig -match "metrics/host:[\s\S]*?processors:" -and $newConfig -notmatch "metrics/host:[\s\S]*?deltatorate") {
            Write-Host "Adding deltatorate to metrics/host pipeline processors..."
            # Add after cumulativetodelta in the metrics/host pipeline
            $newConfig = $newConfig -replace "(metrics/host:[\s\S]*?processors:[\s\S]*?cumulativetodelta[\r\n]+)", ("`$1        - deltatorate`r`n")
          }

          Write-Host "Writing updated configuration..."
          [System.IO.File]::WriteAllText($configPath, $newConfig, [System.Text.Encoding]::UTF8)

          Write-Host "Configuration updated successfully."
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "Configuration complete!"
          Write-Host "=========================================="
          Write-Host ""
          Write-Host "Config file:" $configPath
          if (Test-Path $configPath) {
            $backupPath = $configPath + ".backup.*"
            $latestBackup = Get-ChildItem $backupPath -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($latestBackup) {
              Write-Host "Backup:" $latestBackup.FullName
            }
          }
          Write-Host ""
          Write-Host "SQL Server monitoring configured!"
          Write-Host "Metrics will appear in New Relic within 1-2 minutes."
          Write-Host ""
          Write-Host "To customize metric collection, edit the config file and uncomment:"
          Write-Host "  - timeout, collection_interval, query_monitoring settings"
          Write-Host "  - enable_*_metrics toggles (12 categories available)"
          Write-Host ""
          Write-Host "Next steps:"
          Write-Host "  1. Check service status: Get-Service NRDOT\ Collector\ Host"
          Write-Host "  2. View logs in Event Viewer"
          Write-Host "  3. Verify data in New Relic UI"
          Write-Host ""
          '

    # ── Update config file with endpoint and license key ───────────────────────
    update_config_credentials:
      cmds:
        - |
          powershell -command '
          $configPath = "C:\Program Files (x86)\NRDOT Collector Host\config.yaml"

          Write-Host ""
          Write-Host "=== Updating Config with Credentials ==="
          Write-Host ""

          # Load endpoint configuration
          $endpointFile = Join-Path $env:TEMP "nr-mssql-endpoint.txt"
          if (-not (Test-Path $endpointFile)) {
            Write-Host "ERROR: Endpoint file not found."
            exit 1
          }

          $endpoint = ""
          $region = ""
          Get-Content $endpointFile -Encoding UTF8 | ForEach-Object {
            if ($_ -match "^ENDPOINT=(.*)$") {
              $endpoint = $matches[1].Trim()
            }
            if ($_ -match "^REGION=(.*)$") {
              $region = $matches[1].Trim()
            }
          }

          # Load license key configuration
          $licenseKeyFile = Join-Path $env:TEMP "nr-mssql-license-key.txt"
          if (-not (Test-Path $licenseKeyFile)) {
            Write-Host "ERROR: License key file not found."
            exit 1
          }

          $licenseKey = ""
          Get-Content $licenseKeyFile -Encoding UTF8 | ForEach-Object {
            if ($_ -match "^LICENSE_KEY=(.*)$") {
              $licenseKey = $matches[1].Trim()
            }
          }

          Write-Host "Credentials loaded:"
          Write-Host ("  Region: " + $region)
          Write-Host ("  Endpoint: " + $endpoint)
          Write-Host ("  License Key: " + $licenseKey.Substring(0, [Math]::Min(10, $licenseKey.Length)) + "...")
          Write-Host ""

          # Read config file
          Write-Host "Reading config file..."
          $config = Get-Content $configPath -Raw -Encoding UTF8

          # Replace endpoint
          Write-Host "Updating endpoint..."
          $config = $config -replace "endpoint:\s*\`$\{env:OTEL_EXPORTER_OTLP_ENDPOINT:-[^\}]+\}", "endpoint: $endpoint"

          # Replace license key
          Write-Host "Updating license key..."
          $config = $config -replace "api-key:\s*\`$\{env:NEW_RELIC_LICENSE_KEY\}", "api-key: $licenseKey"

          # Write config file
          Write-Host "Writing config file..."
          [System.IO.File]::WriteAllText($configPath, $config, [System.Text.Encoding]::UTF8)

          Write-Host ""
          Write-Host "Config updated successfully!"
          Write-Host ""
          '

    # ── Restart NRDOT Collector service ────────────────────────────────────────
    restart_service:
      cmds:
        - |
          powershell -command '
          Write-Host ""
          Write-Host "Restarting NRDOT Collector service..."
          Write-Host ""

          # Wait a moment to ensure all config file writes are complete
          Write-Host "Waiting for config to settle..."
          Start-Sleep -Seconds 2

          Write-Host "Stopping service..."
          net stop "NRDOT Collector Host"

          Write-Host ""
          Write-Host "Waiting before restart..."
          Start-Sleep -Seconds 2

          Write-Host "Starting service..."
          $startResult = net start "NRDOT Collector Host" 2>&1
          $startExitCode = $LASTEXITCODE

          Write-Host ""
          Write-Host "Waiting for service to initialize..."
          Start-Sleep -Seconds 3

          Write-Host ""
          Write-Host "Checking service status..."
          $service = Get-Service "NRDOT Collector Host" -ErrorAction SilentlyContinue

          if ($service -and $service.Status -eq "Running") {
            Write-Host "SUCCESS: Service is running!"
            Write-Host ""
            Write-Host "Service restart complete."
          } else {
            Write-Host "WARNING: Service may not have started correctly."
            Write-Host ("Current status: " + $(if ($service) { $service.Status } else { "Unknown" }))
            Write-Host ""
            Write-Host "If the service is not running, try starting it manually:"
            Write-Host "  Start-Service `"NRDOT Collector Host`""
            Write-Host ""
            Write-Host "Check Event Viewer for detailed error information:"
            Write-Host "  Windows Logs > Application"
          }
          Write-Host ""
          '

    # ── Add compression: gzip to config ────────────────────────────────────────
    add_compression:
      cmds:
        - |
          powershell -command '
          $configPath = "C:\Program Files (x86)\NRDOT Collector Host\config.yaml"
          if (Test-Path $configPath) {
            Write-Host "Adding compression: gzip to config..."
            $lines = Get-Content $configPath -Encoding UTF8
            $modified = $false
            $newLines = @()

            for ($i = 0; $i -lt $lines.Count; $i++) {
              $newLines += $lines[$i]

              # Check if this line contains api-key and next line does not have compression
              if ($lines[$i] -match "^\s+api-key:" -and -not $modified) {
                # Check if compression already exists in the next few lines
                $hasCompression = $false
                for ($j = $i + 1; $j -lt [Math]::Min($i + 5, $lines.Count); $j++) {
                  if ($lines[$j] -match "^\s+compression:") {
                    $hasCompression = $true
                    break
                  }
                  if ($lines[$j] -match "^\s*$") { continue }
                  if ($lines[$j] -match "^[a-z]") { break }
                }

                if (-not $hasCompression) {
                  $newLines += "    compression: gzip"
                  Write-Host "Added compression: gzip after api-key line"
                  $modified = $true
                }
              }
            }

            if ($modified) {
              [System.IO.File]::WriteAllLines($configPath, $newLines, [System.Text.Encoding]::UTF8)
              Write-Host "Config file updated successfully"
            } else {
              Write-Host "compression: gzip already exists or api-key not found"
            }
          }
          '

    # ── Remove metricsaslogs from traces pipeline ──────────────────────────────
    cleanup_traces:
      cmds:
        - |
          powershell -command '
          $configPath = "C:\Program Files (x86)\NRDOT Collector Host\config.yaml"
          if (Test-Path $configPath) {
            Write-Host "Cleaning up traces pipeline..."
            $lines = Get-Content $configPath -Encoding UTF8
            $modified = $false

            for ($i = 0; $i -lt $lines.Count; $i++) {
              # Look for traces pipeline and check the next few lines for receivers
              if ($lines[$i] -match "^\s+traces:\s*$") {
                Write-Host "Found traces pipeline at line $($i + 1)"
                # Check next 10 lines for receivers
                for ($j = $i + 1; $j -lt [Math]::Min($i + 10, $lines.Count); $j++) {
                  if ($lines[$j] -match "receivers:.*metricsaslogs") {
                    Write-Host "Found metricsaslogs in receivers at line $($j + 1), removing..."
                    $lines[$j] = $lines[$j] -replace "metricsaslogs,\s*", ""
                    $lines[$j] = $lines[$j] -replace ",\s*metricsaslogs", ""
                    $modified = $true
                    break
                  }
                  # Stop if we hit another pipeline
                  if ($lines[$j] -match "^\s+[a-z_]+(/[a-z_]+)?:\s*$") {
                    break
                  }
                }
              }
            }

            if ($modified) {
              [System.IO.File]::WriteAllLines($configPath, $lines, [System.Text.Encoding]::UTF8)
              Write-Host "Removed metricsaslogs from traces pipeline successfully"
            } else {
              Write-Host "Traces pipeline already clean or not found"
            }
          }
          '

postInstall:
  info: |
    NRDOT Collector configured for SQL Server monitoring.

    Config file: C:\Program Files (x86)\NRDOT Collector Host\config.yaml

    SQL Server metrics will appear in New Relic within 1-2 minutes.
    Check your New Relic account for:
      - SQL Server instance metrics
      - Database performance metrics
      - Query execution plans
      - Wait statistics
