name: mssql-otel-integration-debian
displayName: Microsoft SQL Server OpenTelemetry Integration (Debian)
description: New Relic install recipe for Microsoft SQL Server monitoring using OpenTelemetry on Debian-based systems
repository: https://github.com/newrelic/nrdot-collector-components


installTargets:
  - type: host
    os: linux
    platform: "debian"
    platformVersion: "((8|9|10|11|12)\\.?.*)"
  - type: host
    os: linux
    platform: "ubuntu"
    platformVersion: "(((20|21|22|24)\\.04)|(20.10))"

keywords:
  - Integration
  - SqlServer
  - MSSQL
  - OpenTelemetry
  - Otel
  - Linux
  - Debian

processMatch: []

install:
  version: "3"
  silent: true

  tasks:
    default:
      cmds:
        - task: detect_architecture
        - task: check_sqlcmd
        - task: validate_sql_connection
        - task: install_nrdot_collector

    detect_architecture:
      cmds:
        - |
          ARCH="amd64"
          IS_ARM=$(uname -m | grep -i 'aarch64' | wc -l)
          if [ $IS_ARM -gt 0 ] ; then
            ARCH="arm64"
          fi

          # Store architecture for later tasks
          echo "export DETECTED_ARCH=$ARCH" >> /tmp/nr_otel_arch.sh
          echo "âś“ System architecture: $ARCH"

    check_sqlcmd:
      cmds:
        - |
          # Load detected architecture
          if [ -f /tmp/nr_otel_arch.sh ]; then
            source /tmp/nr_otel_arch.sh
          fi

          # Check if ARM64 - SQL Server has limited ARM support
          ARCH_TYPE=$(uname -m)
          if [ "$ARCH_TYPE" = "aarch64" ] || [ "$DETECTED_ARCH" = "arm64" ]; then
            echo "âš ď¸Ź  Warning: ARM64 has limited SQL Server support" >&2
          fi

          # Check common locations for sqlcmd
          SQLCMD_PATH=""

          if command -v sqlcmd &> /dev/null; then
            SQLCMD_PATH=$(command -v sqlcmd)
          elif [ -f "/opt/mssql-tools/bin/sqlcmd" ]; then
            SQLCMD_PATH="/opt/mssql-tools/bin/sqlcmd"
          elif [ -f "/opt/mssql-tools18/bin/sqlcmd" ]; then
            SQLCMD_PATH="/opt/mssql-tools18/bin/sqlcmd"
          elif [ -f "/usr/local/bin/sqlcmd" ]; then
            SQLCMD_PATH="/usr/local/bin/sqlcmd"
          fi

          # If not found, show error
          if [ -z "$SQLCMD_PATH" ]; then
            echo "" >&2
            echo "âťŚ ERROR: SQL Server command-line tools (sqlcmd) not found" >&2
            echo "" >&2
            echo "To install sqlcmd:" >&2
            echo "  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -" >&2
            echo "  curl https://packages.microsoft.com/config/ubuntu/\$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list" >&2
            echo "  sudo apt-get update" >&2
            echo "  sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev" >&2
            echo "" >&2
            exit 131
          fi

          echo "âś“ sqlcmd detected"

          # Store sqlcmd path for later tasks
          echo "export SQLCMD_PATH=$SQLCMD_PATH" >> /tmp/nr_otel_arch.sh

    validate_sql_connection:
      cmds:
        - |
          echo ""
          echo "Configuring SQL Server connection..."
          echo ""

          # Load sqlcmd path
          if [ -f /tmp/nr_otel_arch.sh ]; then
            source /tmp/nr_otel_arch.sh
          fi

          # Check if running in non-interactive mode
          NON_INTERACTIVE=false
          if [ "${NEW_RELIC_ASSUME_YES}" = "true" ]; then
            NON_INTERACTIVE=true
          fi

          # Function to read password with asterisks
          read_password() {
            password=""

            # Save current terminal settings
            saved_settings=$(stty -g)

            # Disable echo and canonical mode
            stty -echo -icanon min 1 time 0 2>/dev/null || stty -echo

            while IFS= read -r -n1 char 2>/dev/null || char=$(dd bs=1 count=1 2>/dev/null); do
              # Handle Enter key
              if [ -z "$char" ] || [ "$char" = $'\n' ] || [ "$char" = $'\r' ]; then
                break
              fi

              # Handle backspace
              if [ "$char" = $'\x7f' ] || [ "$char" = $'\b' ] || [ "$char" = $'\x08' ]; then
                if [ ${#password} -gt 0 ]; then
                  password="${password%?}"
                  printf '\b \b' >&2
                fi
              else
                password="${password}${char}"
                printf '*' >&2
              fi
            done

            # Restore terminal settings
            stty "$saved_settings" 2>/dev/null
            printf '\n' >&2

            echo "$password"
          }

          # Function to validate hostname
          validate_hostname() {
            local hostname="$1"

            # Check if empty
            if [ -z "$hostname" ]; then
              echo "  âťŚ ERROR: Hostname cannot be empty" >&2
              return 1
            fi

            # Accept all hostnames - validation happens during connection test
            return 0
          }

          # Function to validate port
          validate_port() {
            local port="$1"

            # Check if empty
            if [ -z "$port" ]; then
              echo "  âťŚ ERROR: Port cannot be empty" >&2
              return 1
            fi

            # Check if numeric
            if ! echo "$port" | grep -qE '^[0-9]+$'; then
              echo "  âťŚ ERROR: Port must contain only numbers" >&2
              echo "     You entered: '$port'" >&2
              return 1
            fi

            # Check range
            if [ "$port" -lt 1 ] || [ "$port" -gt 65535 ]; then
              echo "  âťŚ ERROR: Port must be between 1 and 65535" >&2
              echo "     You entered: $port" >&2
              return 1
            fi

            return 0
          }

          # Function to validate username
          validate_username() {
            local username="$1"

            # Check if empty
            if [ -z "$username" ]; then
              echo "  âťŚ ERROR: Username cannot be empty" >&2
              return 1
            fi

            # Check length
            if [ ${#username} -lt 1 ] || [ ${#username} -gt 128 ]; then
              echo "  âťŚ ERROR: Username must be between 1 and 128 characters" >&2
              return 1
            fi

            return 0
          }

          # Function to validate password
          validate_password() {
            local password="$1"

            # Check if empty
            if [ -z "$password" ]; then
              echo "  âťŚ ERROR: Password cannot be empty" >&2
              return 1
            fi

            # Check minimum length
            if [ ${#password} -lt 8 ]; then
              echo "  âš ď¸Ź  WARNING: Password is shorter than 8 characters" >&2
              echo "     SQL Server typically requires strong passwords" >&2
            fi

            return 0
          }

          # Initialize variables with defaults
          HOSTNAME="${NR_CLI_DB_HOSTNAME:-localhost}"
          PORT="${NR_CLI_DB_PORT:-1433}"
          USERNAME="${NR_CLI_DB_USERNAME:-sa}"
          PASSWORD="${NR_CLI_DB_PASSWORD:-}"

          MAX_ATTEMPTS=3
          CONNECTION_SUCCESS=false

          # Collection phase - gather all inputs with validation
          if [ "$NON_INTERACTIVE" = "false" ]; then
            # Ask deployment type first
            echo "Is SQL Server running on this host or remotely?"
            echo "  1. On this host (default)"
            echo "  2. Remote host"
            printf "Choose [1-2]: "
            read -r DEPLOYMENT_CHOICE
            DEPLOYMENT_CHOICE="${DEPLOYMENT_CHOICE:-1}"
            echo ""

            # Hostname collection with validation
            HOSTNAME_VALID=false
            HOSTNAME_ATTEMPTS=0
            while [ "$HOSTNAME_VALID" = "false" ] && [ $HOSTNAME_ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if [ "$DEPLOYMENT_CHOICE" = "1" ]; then
                # On-host: default to localhost
                if [ $HOSTNAME_ATTEMPTS -eq 0 ]; then
                  printf "Enter hostname [default: localhost]: "
                else
                  printf "Re-enter hostname: "
                fi
                read -r INPUT_HOSTNAME
                INPUT_HOSTNAME="${INPUT_HOSTNAME:-localhost}"
              else
                # Remote: no default, require input
                if [ $HOSTNAME_ATTEMPTS -eq 0 ]; then
                  printf "Enter remote hostname or IP address: "
                else
                  printf "Re-enter remote hostname or IP address: "
                fi
                read -r INPUT_HOSTNAME
                if [ -z "$INPUT_HOSTNAME" ]; then
                  echo "  âťŚ ERROR: Hostname cannot be empty for remote host" >&2
                  HOSTNAME_ATTEMPTS=$((HOSTNAME_ATTEMPTS + 1))
                  echo ""
                  continue
                fi
              fi

              if validate_hostname "$INPUT_HOSTNAME"; then
                HOSTNAME="$INPUT_HOSTNAME"
                HOSTNAME_VALID=true
              fi
              HOSTNAME_ATTEMPTS=$((HOSTNAME_ATTEMPTS + 1))
              echo ""
            done

            if [ "$HOSTNAME_VALID" = "false" ]; then
              echo "âťŚ Failed to get valid hostname after $MAX_ATTEMPTS attempts" >&2
              exit 1
            fi

            # Port collection with validation
            PORT_VALID=false
            PORT_ATTEMPTS=0
            while [ "$PORT_VALID" = "false" ] && [ $PORT_ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if [ $PORT_ATTEMPTS -eq 0 ]; then
                printf "Enter port number [default: 1433]: "
              else
                printf "Re-enter port number: "
              fi
              read -r INPUT_PORT
              INPUT_PORT="${INPUT_PORT:-1433}"

              if validate_port "$INPUT_PORT"; then
                PORT="$INPUT_PORT"
                PORT_VALID=true
              fi
              PORT_ATTEMPTS=$((PORT_ATTEMPTS + 1))
              echo ""
            done

            if [ "$PORT_VALID" = "false" ]; then
              echo "âťŚ Failed to get valid port after $MAX_ATTEMPTS attempts" >&2
              exit 1
            fi

            # Username collection with validation
            USERNAME_VALID=false
            USERNAME_ATTEMPTS=0
            while [ "$USERNAME_VALID" = "false" ] && [ $USERNAME_ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if [ $USERNAME_ATTEMPTS -eq 0 ]; then
                printf "Enter SQL Server username [default: sa]: "
              else
                printf "Re-enter SQL Server username: "
              fi
              read -r INPUT_USERNAME
              INPUT_USERNAME="${INPUT_USERNAME:-sa}"

              if validate_username "$INPUT_USERNAME"; then
                USERNAME="$INPUT_USERNAME"
                USERNAME_VALID=true
              fi
              USERNAME_ATTEMPTS=$((USERNAME_ATTEMPTS + 1))
              echo ""
            done

            if [ "$USERNAME_VALID" = "false" ]; then
              echo "âťŚ Failed to get valid username after $MAX_ATTEMPTS attempts" >&2
              exit 1
            fi

            # Password collection with validation
            PASSWORD_VALID=false
            PASSWORD_ATTEMPTS=0
            while [ "$PASSWORD_VALID" = "false" ] && [ $PASSWORD_ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if [ $PASSWORD_ATTEMPTS -eq 0 ]; then
                printf "Enter SQL Server password: "
              else
                printf "Re-enter SQL Server password: "
              fi
              INPUT_PASSWORD=$(read_password)

              if validate_password "$INPUT_PASSWORD"; then
                PASSWORD="$INPUT_PASSWORD"
                PASSWORD_VALID=true
              fi
              PASSWORD_ATTEMPTS=$((PASSWORD_ATTEMPTS + 1))
              echo ""
            done

            if [ "$PASSWORD_VALID" = "false" ]; then
              echo "âťŚ Failed to get valid password after $MAX_ATTEMPTS attempts" >&2
              exit 1
            fi
          else
            # Non-interactive mode - validate environment variables
            # Determine if self-hosted or remote based on hostname
            if [ "$HOSTNAME" = "localhost" ] || [ "$HOSTNAME" = "127.0.0.1" ] || [ "$HOSTNAME" = "::1" ]; then
              echo "Detected self-hosted SQL Server (localhost)"
            else
              echo "Detected remote SQL Server ($HOSTNAME)"
            fi
            echo ""

            if ! validate_hostname "$HOSTNAME"; then
              echo "âťŚ Invalid hostname in NR_CLI_DB_HOSTNAME" >&2
              exit 1
            fi

            if ! validate_port "$PORT"; then
              echo "âťŚ Invalid port in NR_CLI_DB_PORT" >&2
              exit 1
            fi

            if ! validate_username "$USERNAME"; then
              echo "âťŚ Invalid username in NR_CLI_DB_USERNAME" >&2
              exit 1
            fi

            if ! validate_password "$PASSWORD"; then
              echo "âťŚ Invalid password in NR_CLI_DB_PASSWORD" >&2
              exit 1
            fi
          fi

          # Connection testing phase
          echo ""
          echo "Connecting to SQL Server..."

          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$CONNECTION_SUCCESS" = "false" ]; do
            # Build connection string
            SERVER="$HOSTNAME,$PORT"
            TEST_QUERY="SELECT @@VERSION AS 'SQL Server Version', SERVERPROPERTY('ProductVersion') AS 'Version', SERVERPROPERTY('Edition') AS 'Edition'"

            # Use detected sqlcmd path
            if [ -z "$SQLCMD_PATH" ]; then
              SQLCMD_PATH="sqlcmd"
            fi

            # Attempt connection
            TEST_RESULT=$($SQLCMD_PATH -S "$SERVER" -U "$USERNAME" -P "$PASSWORD" -Q "$TEST_QUERY" -t 30 -h -1 -W 2>&1) || TEST_EXIT_CODE=$?

            # Check result
            if [ ${TEST_EXIT_CODE:-0} -eq 0 ] && ! echo "$TEST_RESULT" | grep -q "Msg [0-9]*, Level [0-9]*"; then
              # Extract version info for validation
              # Version numbers: 2017=14.x, 2019=15.x, 2022=16.x, 2025=17.x
              SQL_YEAR=$(echo "$TEST_RESULT" | grep -oE "SQL Server [0-9]{4}" | grep -oE "[0-9]{4}" | head -1)

              # If year not found, try to get version number (14.x, 15.x, etc.)
              if [ -z "$SQL_YEAR" ]; then
                SQL_VERSION=$(echo "$TEST_RESULT" | grep -oE "Version[^0-9]*[0-9]+\.[0-9]+" | grep -oE "[0-9]+\.[0-9]+" | head -1 || echo "")
                if [ -n "$SQL_VERSION" ]; then
                  MAJOR_VERSION=$(echo "$SQL_VERSION" | cut -d. -f1)
                  case "$MAJOR_VERSION" in
                    14) SQL_YEAR="2017" ;;
                    15) SQL_YEAR="2019" ;;
                    16) SQL_YEAR="2022" ;;
                    17) SQL_YEAR="2025" ;;
                    *) SQL_YEAR="" ;;
                  esac
                fi
              fi

              # Display success message with version validation
              if [ -n "$SQL_YEAR" ]; then
                if [ "$SQL_YEAR" -lt 2017 ]; then
                  echo "âťŚ Connected but SQL Server $SQL_YEAR is not supported" >&2
                  echo "   Supported versions: 2017, 2019, 2022, 2025" >&2
                  echo "   This integration requires SQL Server 2017 or later." >&2
                  echo "" >&2
                  exit 131
                elif [ "$SQL_YEAR" -gt 2025 ]; then
                  echo "âś… Connection successful! (SQL Server $SQL_YEAR - newer than tested)"
                else
                  echo "âś… Connection successful! (SQL Server $SQL_YEAR supported)"
                fi
              else
                echo "âś… Connection successful!"
              fi
              echo ""

              CONNECTION_SUCCESS=true

              # Save configuration for later tasks
              CONFIG_FILE="/tmp/nr-mssql-config.txt"

              # Determine deployment type
              DEPLOYMENT_TYPE="remote"
              if [ "$HOSTNAME" = "localhost" ] || [ "$HOSTNAME" = "127.0.0.1" ] || [ "$HOSTNAME" = "::1" ]; then
                DEPLOYMENT_TYPE="self-hosted"
              fi

              echo "HOSTNAME=$HOSTNAME" > "$CONFIG_FILE"
              echo "PORT=$PORT" >> "$CONFIG_FILE"
              echo "USERNAME=$USERNAME" >> "$CONFIG_FILE"
              echo "PASSWORD=$PASSWORD" >> "$CONFIG_FILE"
              echo "SQL_VERSION=$SQL_YEAR" >> "$CONFIG_FILE"
              echo "DEPLOYMENT_TYPE=$DEPLOYMENT_TYPE" >> "$CONFIG_FILE"
              chmod 600 "$CONFIG_FILE"

            else
              echo "âťŚ Connection failed"

              # Detailed error analysis
              if echo "$TEST_RESULT" | grep -qi "Login failed for user"; then
                echo "   Authentication Error: Invalid username or password"
                echo "   â€˘ Verify username: '$USERNAME' and password are correct"
                echo ""

              elif echo "$TEST_RESULT" | grep -qi "Cannot open server"; then
                echo "   Connection Error: Cannot reach SQL Server"
                echo "   â€˘ Check: sudo systemctl status mssql-server"
                echo "   â€˘ Verify hostname: $HOSTNAME and port: $PORT"
                echo ""

              elif echo "$TEST_RESULT" | grep -qi "timeout"; then
                echo "   Timeout Error: Server not responding"
                echo "   â€˘ Test: ping $HOSTNAME"
                echo ""

              else
                echo "   $TEST_RESULT"
                echo ""
              fi

              if [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$NON_INTERACTIVE" = "false" ]; then
                echo "Retry? (1) Same credentials  (2) New credentials  (3) Exit"
                printf "Choice [1-3]: "
                read -r CHOICE

                if [ "$CHOICE" = "2" ]; then
                  echo ""
                  printf "Username: "
                  read USERNAME
                  printf "Password: "
                  PASSWORD=$(read_password)
                  echo "Connecting to SQL Server..."
                elif [ "$CHOICE" != "1" ]; then
                  exit 1
                fi

                ATTEMPT=$((ATTEMPT + 1))
              else
                exit 1
              fi
            fi
          done

          if [ "$CONNECTION_SUCCESS" = "false" ]; then
            echo "âťŚ Could not connect to SQL Server" >&2
            exit 1
          fi

    install_nrdot_collector:
      cmds:
        - |
          echo ""
          echo "Installing NRDOT Collector..."
          echo ""

          # Load detected architecture
          if [ -f /tmp/nr_otel_arch.sh ]; then
            source /tmp/nr_otel_arch.sh
          else
            echo "âťŚ ERROR: Architecture not detected" >&2
            exit 1
          fi

          # Set download URL based on architecture
          if [ "$DETECTED_ARCH" = "arm64" ]; then
            DOWNLOAD_URL="https://download.newrelic.com/database-monitoring/nrdot-collector/nrdot-collector-host-linux-arm64-latest.deb"
            DEB_FILE="nrdot-collector-host-linux-arm64.deb"
            echo "â†’ Downloading NRDOT Collector for ARM64..."
          else
            DOWNLOAD_URL="https://download.newrelic.com/database-monitoring/nrdot-collector/nrdot-collector-host-linux-amd64-latest.deb"
            DEB_FILE="nrdot-collector-host-linux-amd64.deb"
            echo "â†’ Downloading NRDOT Collector for AMD64..."
          fi

          # Download the package
          if ! curl -L -o "/tmp/$DEB_FILE" "$DOWNLOAD_URL" 2>&1; then
            echo "âťŚ Failed to download NRDOT Collector" >&2
            exit 1
          fi

          echo "âś“ Downloaded NRDOT Collector"

          # Install the package
          echo "â†’ Installing NRDOT Collector..."
          if sudo dpkg -i "/tmp/$DEB_FILE" 2>&1; then
            echo "âś“ NRDOT Collector installed successfully"
          else
            echo "âťŚ Failed to install NRDOT Collector" >&2
            echo "Attempting to fix dependencies..."
            sudo apt-get install -f -y
            exit 1
          fi

          # Clean up
          rm -f "/tmp/$DEB_FILE"

          echo ""

postInstall:
  info: |2
    âš™ď¸Ź  The OpenTelemetry Collector configuration will be created in the next steps.
    This installation will configure OpenTelemetry to collect Microsoft SQL Server metrics.
