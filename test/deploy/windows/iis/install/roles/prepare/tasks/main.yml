---

# Newer Windows AMIs (Server 2022/2025) can still be finishing first-boot/sysprep
# when the deploy connects, so the host is reachable over WinRM but unstable
# (e.g. "A system shutdown is in progress", error 0x8007045b). Wait for the
# connection to settle before running any feature-install tasks.
- name: Wait for the host to be reachable and stable after first boot
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600

- name: Set default install_sdk (default not create)
  set_fact:
    install_sdk: "false"
  when: install_sdk is undefined

- name: Installing IIS
  win_shell: |
    Install-WindowsFeature -name Web-Server -IncludeManagementTools

- name: Installing Asp.net
  win_shell: |
    Install-WindowsFeature -name Web-Asp-net45

- block:
  - name: Install Chocolatey
    win_shell: |
      if (!(Get-Command choco.exe -ErrorAction SilentlyContinue)) {
      Set-ExecutionPolicy Bypass -Scope Process -Force;
      [Net.ServicePointManager]::SecurityProtocol = "tls13, tls12, tls"
      iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))}
  - name: Install visual studio community
    win_shell: |
      choco install visualstudio2019community -y
  - name: Reboot and wait for readyness
    ansible.windows.win_reboot:
      reboot_timeout: 600
  when: install_sdk|bool
