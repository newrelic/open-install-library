---
########################################
# Install Docker — Debian/Ubuntu
########################################
- block:
  - name: apt - install Docker prerequisites
    package:
      name:
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
      update_cache: yes
      state: present

  - name: apt - add Docker GPG key
    apt_key:
      url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
      state: present

  - name: apt - add Docker apt repository
    apt_repository:
      repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }}] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
      state: present
      update_cache: yes

  - name: apt - install Docker CE
    package:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin
      state: present

  - name: apt - start Docker service
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: apt - add user to docker group
    user:
      name: "{{ ansible_user }}"
      groups: docker
      append: yes

  when: ansible_pkg_mgr == 'apt'
  become: yes

########################################
# Install Docker — RHEL / Amazon Linux
########################################
- block:
  - name: yum/dnf - install Docker
    package:
      name: docker
      state: present

  - name: yum/dnf - create docker cli-plugins directory
    file:
      path: /usr/local/lib/docker/cli-plugins
      state: directory
      mode: '0755'

  - name: yum/dnf - install docker-compose plugin
    shell: |
      curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) \
        -o /usr/local/lib/docker/cli-plugins/docker-compose
      chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
    args:
      creates: /usr/local/lib/docker/cli-plugins/docker-compose

  - name: yum/dnf - start and enable Docker
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: yum/dnf - add user to docker group
    user:
      name: "{{ ansible_user }}"
      groups: docker
      append: yes

  when: ansible_pkg_mgr in ['yum', 'dnf']
  become: yes

- name: reset ssh connection to pick up docker group
  meta: reset_connection

########################################
# Clone the Kafka self-host-kafka example
########################################
- name: install git
  package:
    name: git
    state: present
  become: yes

- name: clone newrelic-opentelemetry-examples (kafka branch)
  git:
    repo: "https://github.com/shashank-reddy-nr/newrelic-opentelemetry-examples.git"
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples"
    version: "add-otel-kafka-examples"
    depth: 1
    force: yes

########################################
# Start only the Kafka broker containers
# (otel-collector is managed by the recipe under test)
########################################
- name: start kafka brokers via docker compose
  shell: |
    cd /home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka
    docker compose up -d kafka-broker-1 kafka-broker-2 kafka-init
  become: yes

- name: wait for kafka-broker-1 to be healthy
  shell: docker inspect kafka-broker-1 | grep -q '"Status": "healthy"'
  register: kafka_health
  retries: 20
  delay: 10
  until: kafka_health.rc == 0
  become: yes
