---
- name: install git
  package:
    name: git
    state: present
  become: yes

########################################
# Docker install — Amazon Linux 2023
########################################
- block:
  - name: al2023 - install docker
    dnf:
      name: docker
      state: present

  - name: al2023 - start and enable docker
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: al2023 - create docker cli-plugins directory
    file:
      path: /usr/local/lib/docker/cli-plugins
      state: directory
      mode: '0755'

  - name: al2023 - install docker-compose plugin
    shell: |
      curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) \
        -o /usr/local/lib/docker/cli-plugins/docker-compose
      chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
    args:
      creates: /usr/local/lib/docker/cli-plugins/docker-compose

  - name: al2023 - install docker-buildx plugin
    shell: |
      ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
      VERSION=$(curl -sf https://api.github.com/repos/docker/buildx/releases/latest | grep tag_name | cut -d '"' -f4 | sed 's/^v//')
      curl -SL "https://github.com/docker/buildx/releases/download/v${VERSION}/buildx-v${VERSION}.linux-${ARCH}" \
        -o /usr/local/lib/docker/cli-plugins/docker-buildx
      chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
      docker buildx version

  when: ansible_distribution == 'Amazon'
  become: yes

########################################
# Docker install — RHEL / CentOS
########################################
- block:
  - name: rhel - add Docker CE repo
    shell: dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
    args:
      creates: /etc/yum.repos.d/docker-ce.repo

  - name: rhel - install Docker CE
    dnf:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin
      state: present

  - name: rhel - start and enable docker
    systemd:
      name: docker
      state: started
      enabled: yes

  when: ansible_distribution in ['RedHat', 'CentOS', 'OracleLinux']
  become: yes

- name: clone newrelic-opentelemetry-examples (kafka branch)
  git:
    repo: "https://github.com/shashank-reddy-nr/newrelic-opentelemetry-examples.git"
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples"
    version: "add-otel-kafka-examples"
    depth: 1
    force: yes

- name: copy .env.example to .env
  copy:
    src: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka/.env.example"
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka/.env"
    remote_src: yes
    force: no

- name: start kafka brokers via docker compose
  shell: |
    cd /home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka
    docker compose up -d kafka-broker-1 kafka-broker-2 kafka-init
  become: yes

- name: wait for kafka-broker-1 to be healthy
  shell: docker inspect kafka-broker-1 | python3 -c "import sys,json; s=json.load(sys.stdin); exit(0 if s[0]['State']['Health']['Status']=='healthy' else 1)"
  register: kafka_health
  retries: 20
  delay: 10
  until: kafka_health.rc == 0
  become: yes
