---
- name: install git
  package:
    name: git
    state: present
  become: yes

########################################
# Docker install — RHEL / CentOS
########################################
- block:
  - name: add Docker CE repo
    shell: dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
    args:
      creates: /etc/yum.repos.d/docker-ce.repo

  - name: install Docker CE with compose and buildx plugins
    dnf:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin
        - docker-buildx-plugin
      state: present

  - name: start and enable Docker
    systemd:
      name: docker
      state: started
      enabled: yes

  when: ansible_distribution in ['RedHat', 'CentOS', 'OracleLinux']
  become: yes

########################################
# Docker install — Amazon Linux (2 and 2023)
########################################
- block:
  - name: amazon - install docker
    package:
      name: docker
      state: present

  - name: amazon - start and enable docker
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: amazon - create docker cli-plugins directory
    file:
      path: /usr/local/lib/docker/cli-plugins
      state: directory
      mode: '0755'

  - name: amazon - install docker-compose plugin
    shell: |
      VERSION=$(curl -sf https://api.github.com/repos/docker/compose/releases/latest | grep tag_name | cut -d '"' -f4)
      ARCH=$(uname -m)
      curl -SL "https://github.com/docker/compose/releases/download/${VERSION}/docker-compose-linux-${ARCH}" \
        -o /usr/local/lib/docker/cli-plugins/docker-compose
      chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  - name: amazon - install docker-buildx plugin
    shell: |
      BXVER=$(curl -sf https://api.github.com/repos/docker/buildx/releases/latest | grep tag_name | cut -d '"' -f4 | sed 's/^v//')
      ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
      curl -SL "https://github.com/docker/buildx/releases/download/v${BXVER}/buildx-v${BXVER}.linux-${ARCH}" \
        -o /usr/local/lib/docker/cli-plugins/docker-buildx
      chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

  when: ansible_distribution == 'Amazon'
  become: yes

- name: clone newrelic-opentelemetry-examples (kafka branch)
  git:
    repo: "https://github.com/newrelic/newrelic-opentelemetry-examples.git"
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples"
    version: "main"
    depth: 1
    force: yes

- name: write minimal single-broker compose file
  copy:
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka/docker-compose-nrdot.yaml"
    content: |
      services:
        otel-java-agent-init:
          build:
            context: ./otel-java-agent-init
          container_name: otel-java-agent-init
          volumes:
            - otel-agent:/output

        kafka-broker-1:
          image: apache/kafka:3.8.1
          container_name: kafka-broker-1
          depends_on:
            otel-java-agent-init:
              condition: service_completed_successfully
          extra_hosts:
            - "host.docker.internal:host-gateway"
          volumes:
            - otel-agent:/opt/otel-agent:ro
            - ./kafka-jmx-complete-config.yaml:/etc/kafka/kafka-jmx-complete-config.yaml:ro
          environment:
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_NODE_ID: "1"
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
            KAFKA_MIN_INSYNC_REPLICAS: "1"
            KAFKA_NUM_PARTITIONS: "1"
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_OPTS: >-
              -javaagent:/opt/otel-agent/opentelemetry-javaagent.jar
              -Dotel.jmx.enabled=true
              -Dotel.jmx.config=/etc/kafka/kafka-jmx-complete-config.yaml
              -Dotel.instrumentation.runtime-telemetry.enabled=false
              -Dotel.resource.attributes=broker.id=1
              -Dotel.exporter.otlp.endpoint=http://host.docker.internal:4317
              -Dotel.exporter.otlp.protocol=grpc
              -Dotel.metrics.exporter=otlp
              -Dotel.metric.export.interval=30000
          ports:
            - "9092:9092"
          healthcheck:
            test: ["CMD-SHELL", "KAFKA_OPTS='' /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 30s

      volumes:
        otel-agent:

- name: start single kafka broker via docker compose
  shell: |
    cd /home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka
    docker compose -f docker-compose-nrdot.yaml up -d
  become: yes

- name: wait for kafka-broker-1 to be healthy
  shell: docker inspect kafka-broker-1 | python3 -c "import sys,json; s=json.load(sys.stdin); exit(0 if s[0]['State']['Health']['Status']=='healthy' else 1)"
  register: kafka_health
  retries: 20
  delay: 10
  until: kafka_health.rc == 0
  become: yes
