---
- name: install Docker prerequisites
  package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
    update_cache: yes
    state: present
  become: yes

- name: add Docker GPG key
  apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present
  become: yes

- name: add Docker apt repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }}] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    update_cache: yes
  become: yes

- name: install Docker CE
  package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - docker-buildx-plugin
    state: present
  become: yes

- name: start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: clone newrelic-opentelemetry-examples (kafka branch)
  git:
    repo: "https://github.com/newrelic/newrelic-opentelemetry-examples.git"
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples"
    version: "main"
    depth: 1
    force: yes

- name: write minimal single-broker compose file
  copy:
    dest: "/home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka/docker-compose-nrdot.yaml"
    content: |
      services:
        otel-java-agent-init:
          build:
            context: ./otel-java-agent-init
          container_name: otel-java-agent-init
          volumes:
            - otel-agent:/output

        kafka-broker-1:
          image: apache/kafka:3.8.1
          container_name: kafka-broker-1
          depends_on:
            otel-java-agent-init:
              condition: service_completed_successfully
          extra_hosts:
            - "host.docker.internal:host-gateway"
          volumes:
            - otel-agent:/opt/otel-agent:ro
            - ./jmx-custom-config.yaml:/etc/kafka/jmx-custom-config.yaml:ro
          environment:
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_NODE_ID: "1"
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
            KAFKA_MIN_INSYNC_REPLICAS: "1"
            KAFKA_NUM_PARTITIONS: "1"
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_OPTS: >-
              -javaagent:/opt/otel-agent/opentelemetry-javaagent.jar
              -Dotel.jmx.enabled=true
              -Dotel.jmx.config=/etc/kafka/jmx-custom-config.yaml
              -Dotel.instrumentation.runtime-telemetry.enabled=false
              -Dotel.resource.attributes=broker.id=1
              -Dotel.exporter.otlp.endpoint=http://host.docker.internal:4317
              -Dotel.exporter.otlp.protocol=grpc
              -Dotel.metrics.exporter=otlp
              -Dotel.metric.export.interval=30000
          ports:
            - "9092:9092"
          healthcheck:
            test: ["CMD-SHELL", "KAFKA_OPTS='' /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 30s

      volumes:
        otel-agent:

- name: start single kafka broker via docker compose
  shell: |
    cd /home/{{ ansible_user }}/newrelic-opentelemetry-examples/other-examples/collector/kafka/self-host-kafka
    docker compose -f docker-compose-nrdot.yaml up -d
  become: yes

- name: wait for kafka-broker-1 to be healthy
  shell: docker inspect kafka-broker-1 | python3 -c "import sys,json; s=json.load(sys.stdin); exit(0 if s[0]['State']['Health']['Status']=='healthy' else 1)"
  register: kafka_health
  retries: 20
  delay: 10
  until: kafka_health.rc == 0
  become: yes
