---
- debug:
    msg: Install .NET

# Amazon Linux 2 is not covered by the Microsoft unified package feed, so pull
# from the centos/7 Microsoft repo and pin to .NET 8 (latest LTS available there).
# https://learn.microsoft.com/en-us/dotnet/core/install/linux-centos#centos-linux-7

- name: Install Centos 7 RPM
  ansible.builtin.yum:
    name: https://packages.microsoft.com/config/centos/7/packages-microsoft-prod.rpm
    state: present
    lock_timeout: 180
  become: true

- name: Install .NET 8 SDK and ASP.NET Core 8 Runtime
  ansible.builtin.yum:
    name:
      - dotnet-sdk-8.0
      - aspnetcore-runtime-8.0
    state: latest
    lock_timeout: 180
  become: true
