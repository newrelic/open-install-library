- name: Install dependencies
  shell: |
    apt update
    apt install -y wget libicu76
  become: true

- name: Install ASP.NET Core 10 Runtime
  shell: |
    # Download Microsoft package signing key and add Microsoft package repository
    wget https://packages.microsoft.com/config/debian/13/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
    sudo dpkg -i packages-microsoft-prod.deb
    rm packages-microsoft-prod.deb

    # Install ASP.NET Core 10 Runtime
    apt update
    apt install -y dotnet-sdk-10.0 aspnetcore-runtime-10.0
  become: true
