---
- debug:
    msg: Install Redis for NRDOT Testing

- name: Update packages
  shell: yum update -y
  become: yes

- name: Enable EPEL repository (Amazon Linux 2)
  shell: amazon-linux-extras install epel -y || yum install epel-release -y
  become: yes
  ignore_errors: yes

- name: Install Redis
  shell: yum install redis -y
  become: yes

- name: Enable and start Redis
  shell: systemctl enable redis && systemctl start redis
  become: yes
