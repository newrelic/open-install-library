---
- debug:
    msg: Install PHP

- name: install PHP and httpd
  yum:
    pkg:
      - httpd
      - php
      - php-fpm
      - php-mysqlnd
      - mariadb105
      - mariadb105-server
    state: present
  become: yes

- name: ensure nginx is not installed (conflicts with httpd)
  yum:
    name: nginx
    state: absent
  become: yes

- template:
    src: "{{ item }}"
    dest: ~/templates/
    mode: 0755
  with_fileglob:
    - ../../../../../templates/*
  become: yes

- shell:
    cmd: ~/templates/install-wordpress.sh
  become: yes
