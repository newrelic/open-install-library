---
- debug:
    msg: Install PHP

- name: install PHP and nginx
  yum:
    pkg:
      - nginx
      - php
      - php-fpm
      - php-mysqlnd
      - mariadb105
      - mariadb105-server
    state: present
  become: yes

- name: ensure httpd is not installed (conflicts with nginx)
  yum:
    name: httpd
    state: absent
  become: yes

- template:
    src: "{{ item }}"
    dest: ~/templates/
    mode: 0755
  with_fileglob:
    - "../../../../../templates/*"
  become: yes

- shell:
    cmd: ~/templates/install-wordpress.sh
  become: yes
