---
- debug:
    msg: Install PHP and php-fpm for testing

- name: install PHP and php-fpm
  yum:
    pkg:
      - php
      - php-devel
      - php-json
      - php-fpm
    state: present
  become: yes

- name: start php-fpm service
  systemd:
    name: php-fpm
    state: started
    enabled: yes
  become: yes

- name: verify php-fpm is running
  command: systemctl is-active php-fpm
  register: phpfpm_status
  changed_when: false
  become: yes

- debug:
    msg: "PHP-FPM status: {{ phpfpm_status.stdout }}"
