---
- name: Install OpenTelemetry Collector Contrib
  hosts: all
  become: true
  vars:
    collector_type: "{{ collector_type | default('otelcol-contrib') }}"  # 'otelcol-contrib', 'nrdot-collector-experimental', 'nrdot-collector', 'nrdot-collector-k8s'
    otel_bin: >-
      {% if collector_type == 'nrdot-collector-experimental' %}/usr/local/bin/nrdot-collector-experimental
      {% elif collector_type == 'nrdot-collector' %}/usr/local/bin/nrdot-collector
      {% elif collector_type == 'nrdot-collector-k8s' %}/usr/local/bin/nrdot-collector-k8s
      {% else %}/usr/local/bin/otelcol-contrib{% endif %}
    otel_config_dir: >-
      {% if collector_type == 'nrdot-collector-experimental' %}/etc/nrdot-collector-experimental
      {% elif collector_type == 'nrdot-collector' %}/etc/nrdot-collector
      {% elif collector_type == 'nrdot-collector-k8s' %}/etc/nrdot-collector-k8s
      {% else %}/etc/otelcol-contrib{% endif %}
    otel_config_path: "{{ otel_config_dir }}/config.yaml"
    # otel_version, rpm_file, deb_file, download_url will be set dynamically
    pre_tasks:
      - name: Check if otel_version is provided
        set_fact:
          otel_version_provided: "{{ otel_version is defined and otel_version|length > 0 }}"

      - name: Get latest collector version from GitHub if not provided
        ansible.builtin.uri:
          url: >-
            {% if collector_type.startswith('nrdot-collector') %}
              https://api.github.com/repos/newrelic/nrdot-collector-releases/releases/latest
            {% else %}
              https://api.github.com/repos/open-telemetry/opentelemetry-collector-releases/releases/latest
            {% endif %}
          return_content: yes
        register: otel_release
        when: not otel_version_provided | bool

      - name: Set otel_version to latest if not provided
        set_fact:
          otel_version: "{{ otel_release.json.tag_name | regex_replace('^v', '') }}"
        when: not otel_version_provided | bool

      - name: Set download URLs and filenames
        set_fact:
          rpm_file: >-
            {% if collector_type == 'nrdot-collector-experimental' %}
              nrdot-collector-experimental_{{ otel_version }}_linux_amd64.rpm
            {% elif collector_type == 'nrdot-collector' %}
              nrdot-collector_{{ otel_version }}_linux_amd64.rpm
            {% elif collector_type == 'nrdot-collector-k8s' %}
              nrdot-collector-k8s_{{ otel_version }}_linux_amd64.rpm
            {% else %}
              otelcol-contrib_{{ otel_version }}_linux_amd64.rpm
            {% endif %}
          deb_file: >-
            {% if collector_type == 'nrdot-collector-experimental' %}
              nrdot-collector-experimental_{{ otel_version }}_linux_amd64.deb
            {% elif collector_type == 'nrdot-collector' %}
              nrdot-collector_{{ otel_version }}_linux_amd64.deb
            {% elif collector_type == 'nrdot-collector-k8s' %}
              nrdot-collector-k8s_{{ otel_version }}_linux_amd64.deb
            {% else %}
              otelcol-contrib_{{ otel_version }}_amd64.deb
            {% endif %}
          download_url: >-
            {% if collector_type.startswith('nrdot-collector') %}
              https://github.com/newrelic/nrdot-collector-releases/releases/download/{{ otel_version }}
            {% else %}
              https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}
            {% endif %}
  tasks:
    - name: Gather OS family
      ansible.builtin.setup:
        filter: ansible_os_family

    - name: Ensure wget is installed
      ansible.builtin.package:
        name: wget
        state: present

    - name: Download and install otelcol-contrib (RHEL family)
      when: ansible_os_family == 'RedHat'
      block:
        - name: Download RPM if not present
          ansible.builtin.get_url:
            url: "{{ download_url }}/{{ rpm_file }}"
            dest: "/tmp/{{ rpm_file }}"
            mode: '0644'
          args:
            creates: "/tmp/{{ rpm_file }}"
        - name: Install RPM
          ansible.builtin.yum:
            name: "/tmp/{{ rpm_file }}"
            state: present

    - name: Download and install otelcol-contrib (Debian family)
      when: ansible_os_family == 'Debian'
      block:
        - name: Download DEB if not present
          ansible.builtin.get_url:
            url: "{{ download_url }}/{{ deb_file }}"
            dest: "/tmp/{{ deb_file }}"
            mode: '0644'
          args:
            creates: "/tmp/{{ deb_file }}"
        - name: Install DEB
          ansible.builtin.apt:
            deb: "/tmp/{{ deb_file }}"

    - name: Validate collector binary
      ansible.builtin.command: file {{ otel_bin }}
      register: otel_bin_file
      failed_when: otel_bin_file.stdout is not search('ELF 64-bit')

    - name: Show collector version
      ansible.builtin.command: "{{ otel_bin }} --version"
      register: otel_version_out
      changed_when: false

    - name: Create config directory
      ansible.builtin.file:
        path: "{{ otel_config_dir }}"
        state: directory
        mode: '0755'

    - name: Render collector config from template
      ansible.builtin.template:
        src: "{{ otel_config_template | default('templates/config.yaml.j2') }}"
        dest: "{{ otel_config_path }}"
        mode: '0644'
      vars:
        otel_api_key: "{{ otel_api_key | default('') }}"
        otel_endpoint: "{{ otel_endpoint | default('') }}"

    - name: Stop collector if running
      ansible.builtin.shell: "pkill -f '{{ otel_bin }}' || true"
      ignore_errors: true

    - name: Start collector
      ansible.builtin.shell: "nohup {{ otel_bin }} --config '{{ otel_config_path }}' > ~/otel_manual.log 2>&1 &"
      async: 10
      poll: 0

    - name: Wait for collector to start
      ansible.builtin.wait_for:
        path: "{{ otel_bin }}"
        state: present
        timeout: 10

    - name: Check if collector is running
      ansible.builtin.shell: "pgrep -f '{{ otel_bin }}'"
      register: otel_running
      failed_when: otel_running.rc != 0
