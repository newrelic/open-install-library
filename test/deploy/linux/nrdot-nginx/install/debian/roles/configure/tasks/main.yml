---
- name: install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  become: yes

- name: write stub_status config on port 8080
  copy:
    dest: /etc/nginx/conf.d/stub_status.conf
    content: |
      server {
          listen 8080;
          location /nginx_status {
              stub_status;
              allow 127.0.0.1;
              deny all;
          }
      }
  become: yes

- name: start and enable nginx
  systemd:
    name: nginx
    state: restarted
    enabled: yes
  become: yes
