---
# Ubuntu cloud AMIs run cloud-init + unattended-upgrades on first boot,
# holding dpkg/apt locks for several minutes. Wait explicitly for those
# to release before touching apt (avoids 'Could not get lock
# /var/lib/dpkg/lock-frontend' + SSH-drop mid-transaction).
- name: wait for cloud-init / unattended-upgrades to release dpkg locks
  shell: |
    for i in $(seq 1 60); do
      if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
         && ! fuser /var/lib/dpkg/lock         >/dev/null 2>&1 \
         && ! fuser /var/lib/apt/lists/lock    >/dev/null 2>&1; then
        exit 0
      fi
      sleep 5
    done
    echo "dpkg lock still held after 5 min; continuing anyway"
  become: yes
  changed_when: false

- name: install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  become: yes

- name: write stub_status config on port 8080
  copy:
    dest: /etc/nginx/conf.d/stub_status.conf
    content: |
      server {
          listen 8080;
          location /nginx_status {
              stub_status;
              allow 127.0.0.1;
              deny all;
          }
      }
  become: yes

- name: start and enable nginx
  systemd:
    name: nginx
    state: restarted
    enabled: yes
  become: yes
